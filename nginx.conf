server {
  listen 80;
  listen [::]:80;
  server_name _;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/manifest+json application/javascript text/javascript application/wasm image/svg+xml;

  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /drift_worker.js {
    expires -1;
    try_files $uri =404;
  }

  location = /sqlite3.wasm {
    types {
      application/wasm wasm;
    }
    expires -1;
    try_files $uri =404;
  }

  location = /manifest.json {
    types {
      application/manifest+json json;
    }
    expires 30d;
    try_files $uri =404;
  }

  location /pkg/ {
    try_files $uri =404;
  }

  location ~* \.wasm$ {
    types {
      application/wasm wasm;
    }
    try_files $uri =404;
  }

  location ~* \.webmanifest$ {
    types {
      application/manifest+json webmanifest;
    }
    expires 30d;
    try_files $uri =404;
  }

  location ~* \.mjs$ {
    types {
      text/javascript mjs;
    }
    expires 30d;
    try_files $uri =404;
  }

  location ~* \.(?:js|css|ico|png|jpg|jpeg|gif|svg|webp|avif|woff2?)$ {
    expires 30d;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
