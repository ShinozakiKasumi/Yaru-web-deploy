server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /drift_worker.js {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location = /sqlite3.wasm {
    add_header Cache-Control "no-cache" always;
    types {
      application/wasm wasm;
    }
    try_files $uri =404;
  }

  location /pkg/ {
    try_files $uri =404;
  }

  location ~* \.wasm$ {
    types {
      application/wasm wasm;
    }
    try_files $uri =404;
  }

  location ~* \.(?:js|mjs|css|ico|png|jpg|jpeg|gif|svg|webp|avif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
