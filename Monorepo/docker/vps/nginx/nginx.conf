worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 200m;
  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 2s;

  server {
    listen 80;
    server_name 127.0.0.1 localhost 152.53.160.77;

    location / {
      return 301 https://origin-api.asaka.moe$request_uri;
    }
  }

  server {
    listen 80;
    server_name asaka.moe app.asaka.moe web.asaka.moe api.asaka.moe update.asaka.moe ai.asaka.moe newapi.asaka.moe origin-api.asaka.moe;

    location /.well-known/acme-challenge/ {
      root /var/www/acme;
    }

    location / {
      if ($host = app.asaka.moe) {
        return 301 https://asaka.moe$request_uri;
      }
      if ($host = newapi.asaka.moe) {
        return 301 https://ai.asaka.moe$request_uri;
      }
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name api.asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location = /logs/manifest.webmanifest {
      set $dozzle_manifest http://dozzle:8080/logs/manifest.webmanifest;
      proxy_pass $dozzle_manifest;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /logs/api/ {
      auth_basic "Restricted";
      auth_basic_user_file /etc/nginx/.htpasswd-dozzle;
      set $dozzle_api http://dozzle:8080;
      proxy_pass $dozzle_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      add_header X-Accel-Buffering no;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_request_buffering off;
    }

    location /logs/ {
      auth_basic "Restricted";
      auth_basic_user_file /etc/nginx/.htpasswd-dozzle;
      set $dozzle_ui http://dozzle:8080;
      proxy_pass $dozzle_ui;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_read_timeout 300s;
    }

    location = /api/ai/chat {
      set $yaru_api http://yaru-core:8787;
      proxy_pass $yaru_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      add_header X-Accel-Buffering no;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_request_buffering off;
    }

    location /api/ai/chat/ {
      set $yaru_api http://yaru-core:8787;
      proxy_pass $yaru_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      add_header X-Accel-Buffering no;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_request_buffering off;
    }

    location / {
      set $yaru_api http://yaru-core:8787;
      proxy_pass $yaru_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 443 ssl;
    server_name origin-api.asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      set $yaru_api http://yaru-core:8787;
      proxy_pass $yaru_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 443 ssl;
    server_name update.asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location = /latest.json {
      return 302 https://github.com/ProjectYaru/Yaru-release/releases/latest/download/latest.json;
    }

    location / {
      return 302 https://github.com/ProjectYaru/Yaru-release/releases/latest;
    }
  }

  server {
    listen 443 ssl;
    server_name ai.asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location = /v1/chat/completions {
      # Keep streaming upstream responses unbuffered and tolerate slow headers
      # from the OpenAI-compatible gateway.
      set $new_api http://new-api:3000;
      proxy_pass $new_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      add_header X-Accel-Buffering no;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_request_buffering off;
    }

    location / {
      # Resolve the upstream at request time so nginx can still boot even
      # when the OnePanel new-api app is temporarily absent.
      set $new_api http://new-api:3000;
      proxy_pass $new_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 443 ssl;
    server_name web.asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://host.docker.internal:18082;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 443 ssl;
    server_name asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://host.docker.internal:18082;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 443 ssl;
    server_name app.asaka.moe newapi.asaka.moe;

    ssl_certificate /etc/nginx/certs/asaka.crt;
    ssl_certificate_key /etc/nginx/certs/asaka.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      if ($host = app.asaka.moe) {
        return 301 https://asaka.moe$request_uri;
      }
      if ($host = newapi.asaka.moe) {
        return 301 https://ai.asaka.moe$request_uri;
      }
      return 410;
    }
  }
}
