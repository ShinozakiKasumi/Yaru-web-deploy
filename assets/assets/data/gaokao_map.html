如力、速度、加速度）的大小和方向，解决平面或空间中的物理问题", "formula": "$$\\vec{F} = m\\vec{a}$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "物理情境中的向量建模"}, {"id": "MACRO_08_004_03_A003", "name": "向量的点积与夹角", "level": "atomic", "val": 4, "color": "#e84393", "desc": "计算两个向量的点积，用于求夹角、判断垂直或计算功等物理量", "formula": "$$\\vec{A} \\cdot \\vec{B} = |\\vec{A}||\\vec{B}|\\cos\\theta$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "物理情境中的向量建模"}, {"id": "MACRO_08_004_03_A004", "name": "向量的叉积与力矩", "level": "atomic", "val": 4, "color": "#e84393", "desc": "计算两个向量的叉积，用于求力矩、角动量等具有方向性的物理量", "formula": "$$\\vec{\\tau} = \\vec{r} \\times \\vec{F}$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "物理情境中的向量建模"}, {"id": "MACRO_08_004_向量坐标法在几何证明中的应用", "name": "向量坐标法在几何证明中的应用", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_004_04_A001", "name": "向量的坐标表示", "level": "atomic", "val": 4, "color": "#e84393", "desc": "将平面向量用有序实数对表示，体现向量起点与终点坐标的差值关系", "formula": "$$\\vec{a} = (x, y) = x\\vec{i} + y\\vec{j}$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "向量坐标法在几何证明中的应用"}, {"id": "MACRO_08_004_04_A002", "name": "向量线性运算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "向量加减法及数乘运算在坐标形式下的分量运算法则", "formula": "$$\\vec{a} \\pm \\vec{b} = (x_1 \\pm x_2, y_1 \\pm y_2),\\quad \\lambda\\vec{a} = (\\lambda x, \\lambda y)$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "向量坐标法在几何证明中的应用"}, {"id": "MACRO_08_004_04_A003", "name": "向量模长公式", "level": "atomic", "val": 4, "color": "#e84393", "desc": "通过坐标计算向量长度的勾股定理应用", "formula": "$$|\\vec{a}| = \\sqrt{x^2 + y^2}$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "向量坐标法在几何证明中的应用"}, {"id": "MACRO_08_004_04_A004", "name": "向量垂直条件", "level": "atomic", "val": 4, "color": "#e84393", "desc": "利用坐标形式判断两向量垂直的充要条件", "formula": "$$\\vec{a} \\perp \\vec{b} \\iff x_1x_2 + y_1y_2 = 0$$", "domain_zh": "向量复数", "macro_topic": "向量应用", "micro_topic": "向量坐标法在几何证明中的应用"}, {"id": "MACRO_08_005", "name": "复数运算", "level": "macro", "val": 16, "color": "#e84393"}, {"id": "MACRO_08_005_复数的基本概念与表示", "name": "复数的基本概念与表示", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_005_01_A001", "name": "复数的定义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "形如 $a+bi$（$a,b\\in\\mathbb{R}$）的数称为复数，其中 $a$ 称为实部，$b$ 称为虚部，$i$ 称为虚数单位，满足 $i^2=-1$。", "formula": "$$z=a+bi,\\quad a,b\\in\\mathbb{R},\\quad i^2=-1$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的基本概念与表示"}, {"id": "MACRO_08_005_01_A002", "name": "复数的分类", "level": "atomic", "val": 4, "color": "#e84393", "desc": "当 $b=0$ 时，$z=a$ 为实数；当 $b\\neq0$ 时，$z=a+bi$ 为虚数；特别地，当 $a=0$ 且 $b\\neq0$ 时，$z=bi$ 称为纯虚数。", "formula": "$$\\begin{cases} b=0 & \\text{实数}\\\\ b\\neq0 & \\text{虚数}\\\\ a=0,b\\neq0 & \\text{纯虚数} \\end{cases}$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的基本概念与表示"}, {"id": "MACRO_08_005_01_A003", "name": "复数的几何表示", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z=a+bi$ 与复平面内的点 $Z(a,b)$ 一一对应，也可用向量 $\\overrightarrow{OZ}$ 表示，其中 $O$ 为坐标原点。", "formula": "$$z=a+bi \\leftrightarrow Z(a,b) \\leftrightarrow \\overrightarrow{OZ}$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的基本概念与表示"}, {"id": "MACRO_08_005_01_A004", "name": "复数的模", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z=a+bi$ 的模（或绝对值）定义为 $|z|=\\sqrt{a^2+b^2}$，表示复平面上对应点到原点的距离。", "formula": "$$|z|=\\sqrt{a^2+b^2}$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的基本概念与表示"}, {"id": "MACRO_08_005_复数的四则运算", "name": "复数的四则运算", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_005_02_A001", "name": "复数加法运算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "两个复数相加时，实部相加，虚部相加", "formula": "$$(a+bi)+(c+di)=(a+c)+(b+d)i$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的四则运算"}, {"id": "MACRO_08_005_02_A002", "name": "复数减法运算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "两个复数相减时，实部相减，虚部相减", "formula": "$$(a+bi)-(c+di)=(a-c)+(b-d)i$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的四则运算"}, {"id": "MACRO_08_005_02_A003", "name": "复数乘法运算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "使用多项式乘法展开后合并同类项，注意i²=-1", "formula": "$$(a+bi)(c+di)=ac+adi+bci+bdi^2=(ac-bd)+(ad+bc)i$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的四则运算"}, {"id": "MACRO_08_005_02_A004", "name": "复数除法运算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "通过分母有理化转化为乘法运算，乘以分母的共轭复数", "formula": "$$\\frac{a+bi}{c+di}=\\frac{(a+bi)(c-di)}{(c+di)(c-di)}=\\frac{(ac+bd)+(bc-ad)i}{c^2+d^2}$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的四则运算"}, {"id": "MACRO_08_003_数量积的运算性质", "name": "数量积的运算性质", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_003_02_A001", "name": "数量积的交换律", "level": "atomic", "val": 4, "color": "#e84393", "desc": "两个向量的数量积满足交换律，即顺序不影响结果", "formula": "$$\\vec{a} \\cdot \\vec{b} = \\vec{b} \\cdot \\vec{a}$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "数量积的运算性质"}, {"id": "MACRO_08_003_02_A002", "name": "数量积的分配律", "level": "atomic", "val": 4, "color": "#e84393", "desc": "数量积对向量加法满足分配律", "formula": "$$\\vec{a} \\cdot (\\vec{b} + \\vec{c}) = \\vec{a} \\cdot \\vec{b} + \\vec{a} \\cdot \\vec{c}$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "数量积的运算性质"}, {"id": "MACRO_08_003_02_A003", "name": "数量积与数乘的结合律", "level": "atomic", "val": 4, "color": "#e84393", "desc": "数量积与标量乘法满足结合律", "formula": "$$(k\\vec{a}) \\cdot \\vec{b} = k(\\vec{a} \\cdot \\vec{b}) = \\vec{a} \\cdot (k\\vec{b})$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "数量积的运算性质"}, {"id": "MACRO_08_003_02_A004", "name": "向量自身数量积的性质", "level": "atomic", "val": 4, "color": "#e84393", "desc": "向量的数量积与其模长平方相等，且非负", "formula": "$$\\vec{a} \\cdot \\vec{a} = |\\vec{a}|^2 \\geq 0$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "数量积的运算性质"}, {"id": "MACRO_08_005_复数的几何意义", "name": "复数的几何意义", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_005_03_A001", "name": "复数的几何表示", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 可以用复平面上的点 $Z(a, b)$ 或向量 $\\overrightarrow{OZ}$ 表示，其中实部 $a$ 对应横坐标，虚部 $b$ 对应纵坐标。", "formula": "$$z = a + bi \\leftrightarrow Z(a, b)$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的几何意义"}, {"id": "MACRO_08_005_03_A002", "name": "复数的模", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的模 $|z|$ 表示对应向量 $\\overrightarrow{OZ}$ 的长度，计算公式为 $|z| = \\sqrt{a^2 + b^2}$，几何意义是点 $Z$ 到原点 $O$ 的距离。", "formula": "$$|z| = \\sqrt{a^2 + b^2}$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的几何意义"}, {"id": "MACRO_08_005_03_A003", "name": "复数的辐角", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的辐角 $\\theta$ 是以 $x$ 轴正半轴为始边，向量 $\\overrightarrow{OZ}$ 为终边的角，满足 $\\tan\\theta = \\frac{b}{a}$（$a \\neq 0$），通常取主值 $\\theta \\in [0, 2\\pi)$ 或 $(-\\pi, \\pi]$。", "formula": "$$\\tan\\theta = \\frac{b}{a}, \\quad a \\neq 0$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的几何意义"}, {"id": "MACRO_08_005_03_A004", "name": "复数加减法的几何意义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数加法对应向量的平行四边形法则，减法对应向量的三角形法则。设复数 $z_1$、$z_2$ 对应向量 $\\overrightarrow{OA}$、$\\overrightarrow{OB}$，则 $z_1 + z_2$ 对应向量 $\\overrightarrow{OC}$（以 $OA$、$OB$ 为邻边的平行四边形对角线），$z_1 - z_2$ 对应向量 $\\overrightarrow{BA}$。", "formula": "$$z_1 + z_2 \\leftrightarrow \\overrightarrow{OA} + \\overrightarrow{OB}, \\quad z_1 - z_2 \\leftrightarrow \\overrightarrow{OA} - \\overrightarrow{OB}$$", "domain_zh": "向量复数", "macro_topic": "复数运算", "micro_topic": "复数的几何意义"}, {"id": "MACRO_08_003_坐标表示与计算", "name": "坐标表示与计算", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_003_03_A001", "name": "向量的数量积定义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "两个向量的数量积（点积）定义为它们的模长与夹角余弦的乘积，记作 a·b = |a||b|cosθ", "formula": "$$\\mathbf{a} \\cdot \\mathbf{b} = |\\mathbf{a}| |\\mathbf{b}| \\cos \\theta$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "坐标表示与计算"}, {"id": "MACRO_08_003_03_A002", "name": "坐标形式下的数量积计算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "给定向量 a=(x₁,y₁) 和 b=(x₂,y₂)，数量积可通过坐标分量相乘再求和计算", "formula": "$$\\mathbf{a} \\cdot \\mathbf{b} = x_1 x_2 + y_1 y_2$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "坐标表示与计算"}, {"id": "MACRO_08_003_03_A003", "name": "数量积的几何意义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "数量积的绝对值等于一个向量在另一个向量方向上的投影长度与另一个向量模长的乘积", "formula": "$$|\\mathbf{a} \\cdot \\mathbf{b}| = |\\mathbf{a}| |\\operatorname{proj}_{\\mathbf{b}} \\mathbf{a}|$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "坐标表示与计算"}, {"id": "MACRO_08_003_03_A004", "name": "垂直向量的数量积", "level": "atomic", "val": 4, "color": "#e84393", "desc": "两个非零向量垂直的充要条件是它们的数量积为零", "formula": "$$\\mathbf{a} \\perp \\mathbf{b} \\iff \\mathbf{a} \\cdot \\mathbf{b} = 0$$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "坐标表示与计算"}, {"id": "MACRO_08_006", "name": "复数几何", "level": "macro", "val": 16, "color": "#e84393"}, {"id": "MACRO_08_006_复数的几何表示", "name": "复数的几何表示", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_006_01_A001", "name": "复数的几何表示", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 可以用复平面上的点 $Z(a, b)$ 或向量 $\\overrightarrow{OZ}$ 来表示，其中实部 $a$ 对应横坐标，虚部 $b$ 对应纵坐标。", "formula": "$$z = a + bi \\leftrightarrow Z(a, b)$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数的几何表示"}, {"id": "MACRO_08_006_01_A002", "name": "复数的模", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的模 $|z|$ 表示对应向量 $\\overrightarrow{OZ}$ 的长度，计算公式为 $|z| = \\sqrt{a^2 + b^2}$，其几何意义是点 $Z$ 到原点 $O$ 的距离。", "formula": "$$|z| = \\sqrt{a^2 + b^2}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数的几何表示"}, {"id": "MACRO_08_006_01_A003", "name": "复数的辐角", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的辐角 $\\theta$ 是以 $x$ 轴正半轴为始边，向量 $\\overrightarrow{OZ}$ 为终边的角，满足 $\\tan\\theta = \\frac{b}{a}$（$a \\neq 0$），通常取主值 $\\theta \\in [0, 2\\pi)$ 或 $(-\\pi, \\pi]$。", "formula": "$$\\tan\\theta = \\frac{b}{a},\\quad a \\neq 0$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数的几何表示"}, {"id": "MACRO_08_006_01_A004", "name": "复数的三角形式", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 可以表示为三角形式 $z = r(\\cos\\theta + i\\sin\\theta)$，其中 $r = |z|$ 是模，$\\theta$ 是辐角，这种形式便于进行乘除和乘方运算。", "formula": "$$z = r(\\cos\\theta + i\\sin\\theta)$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数的几何表示"}, {"id": "MACRO_08_006_复数运算的几何应用", "name": "复数运算的几何应用", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_006_02_A001", "name": "复数的模", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的模 $|z| = \\sqrt{a^2 + b^2}$，表示复数在复平面上对应的点到原点的距离。", "formula": "$$|z| = \\sqrt{a^2 + b^2}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数运算的几何应用"}, {"id": "MACRO_08_006_02_A002", "name": "复数的辐角", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的辐角 $\\theta$ 满足 $\\tan\\theta = \\frac{b}{a}$（$a \\neq 0$），表示复数在复平面上对应的点与原点连线与正实轴所成的角。", "formula": "$$\\tan\\theta = \\frac{b}{a}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数运算的几何应用"}, {"id": "MACRO_08_006_02_A003", "name": "复数加减的几何意义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数加减对应于复平面上向量的加减，满足平行四边形法则或三角形法则。", "formula": "$$\\vec{OZ_1} \\pm \\vec{OZ_2} = \\vec{OZ}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数运算的几何应用"}, {"id": "MACRO_08_006_02_A004", "name": "复数乘除的几何意义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数相乘，模相乘，辐角相加；复数相除，模相除，辐角相减。即若 $z_1 = r_1(\\cos\\theta_1 + i\\sin\\theta_1)$，$z_2 = r_2(\\cos\\theta_2 + i\\sin\\theta_2)$，则 $z_1 \\cdot z_2 = r_1r_2[\\cos(\\theta_1+\\theta_2) + i\\sin(\\theta_1+\\theta_2)]$，$\\frac{z_1}{z_2} = \\frac{r_1}{r_2}[\\cos(\\theta_1-\\theta_2) + i\\sin(\\theta_1-\\theta_2)]$。", "formula": "$$z_1 \\cdot z_2 = r_1r_2[\\cos(\\theta_1+\\theta_2) + i\\sin(\\theta_1+\\theta_2)], \\quad \\frac{z_1}{z_2} = \\frac{r_1}{r_2}[\\cos(\\theta_1-\\theta_2) + i\\sin(\\theta_1-\\theta_2)]$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数运算的几何应用"}, {"id": "MACRO_08_006_复数模与几何度量", "name": "复数模与几何度量", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_006_03_A001", "name": "复数模的定义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数z=a+bi的模定义为|z|=√(a²+b²)，表示复数在复平面上对应点到原点的距离。", "formula": "$$|z| = \\sqrt{a^2 + b^2}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数模与几何度量"}, {"id": "MACRO_08_006_03_A002", "name": "复数模的几何意义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数模的几何意义是复平面上对应点与原点之间的距离，可用于计算两点间的距离。", "formula": "$$|z_1 - z_2| = \\sqrt{(x_1-x_2)^2 + (y_1-y_2)^2}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数模与几何度量"}, {"id": "MACRO_08_006_03_A003", "name": "复数模的性质", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数模具有非负性、三角不等式等性质，如|z₁z₂|=|z₁||z₂|，|z₁/z₂|=|z₁|/|z₂|（z₂≠0）。", "formula": "$$|z_1 z_2| = |z_1| \\cdot |z_2|$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数模与几何度量"}, {"id": "MACRO_08_006_03_A004", "name": "模与共轭复数的关系", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数z的模平方等于z与其共轭复数的乘积，即|z|²=z·conjugate(z)。", "formula": "$$|z|^2 = z \\cdot \\overline{z}$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数模与几何度量"}, {"id": "MACRO_08_003_垂直条件与投影应用", "name": "垂直条件与投影应用", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_003_04_A001", "name": "向量垂直的充要条件", "level": "atomic", "val": 4, "color": "#e84393", "desc": "两向量垂直当且仅当它们的数量积为零", "formula": "$\\vec{a} \\cdot \\vec{b} = 0$", "domain_zh": "向量复数", "macro_topic": "数量积", "micro_topic": "垂直条件与投影应用"}, {"id": "MACRO_08_003_04_A002", "name": "向量投影长度公式", "level": "atomic", "val": 4, "color": "#e84393",  "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数几何变换分析"}, {"id": "MACRO_08_006_04_A004", "name": "复数的共轭与对称", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数 $z = a + bi$ 的共轭 $\\bar{z} = a - bi$，在复平面上表示点 $Z(a, b)$ 关于实轴的对称点。", "formula": "$$\\bar{z} = a - bi \\leftrightarrow \\overline{Z}(a, -b)$$", "domain_zh": "向量复数", "macro_topic": "复数几何", "micro_topic": "复数几何变换分析"}, {"id": "MACRO_08_007", "name": "向量三角", "level": "macro", "val": 16, "color": "#e84393"}, {"id": "MACRO_08_007_向量的基本概念与运算", "name": "向量的基本概念与运算", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_007_01_A001", "name": "向量定义", "level": "atomic", "val": 4, "color": "#e84393", "desc": "既有大小又有方向的量，可用有向线段或坐标表示", "formula": "$$\\vec{a} = (x, y)$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量的基本概念与运算"}, {"id": "MACRO_08_007_01_A002", "name": "向量加法", "level": "atomic", "val": 4, "color": "#e84393", "desc": "遵循平行四边形法则，坐标对应相加", "formula": "$$\\vec{a} + \\vec{b} = (x_1+x_2, y_1+y_2)$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量的基本概念与运算"}, {"id": "MACRO_08_007_01_A003", "name": "数乘运算", "level": "atomic", "val": 4, "color": "#e84393", "desc": "标量与向量的乘积改变向量长度和方向", "formula": "$$k\\vec{a} = (kx, ky)$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量的基本概念与运算"}, {"id": "MACRO_08_007_01_A004", "name": "向量模长", "level": "atomic", "val": 4, "color": "#e84393", "desc": "向量的长度计算公式", "formula": "$$|\\vec{a}| = \\sqrt{x^2 + y^2}$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量的基本概念与运算"}, {"id": "MACRO_08_008", "name": "向量解几", "level": "macro", "val": 16, "color": "#e84393"}, {"id": "MACRO_08_008_向量与复数的对应关系", "name": "向量与复数的对应关系", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_008_01_A001", "name": "向量与复数的对应关系", "level": "atomic", "val": 4, "color": "#e84393", "desc": "平面向量与复数在坐标系中可以一一对应，向量对应复数的几何表示", "formula": "$$\\vec{a} = (x, y) \\leftrightarrow z = x + yi$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "向量与复数的对应关系"}, {"id": "MACRO_08_008_01_A002", "name": "向量模与复数模的关系", "level": "atomic", "val": 4, "color": "#e84393", "desc": "向量的模等于对应复数的模，表示长度或大小", "formula": "$$|\\vec{a}| = \\sqrt{x^2 + y^2} = |z|$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "向量与复数的对应关系"}, {"id": "MACRO_08_008_01_A003", "name": "向量加法与复数加法的对应", "level": "atomic", "val": 4, "color": "#e84393", "desc": "向量加法对应于复数的加法运算，满足平行四边形法则", "formula": "$$\\vec{a} + \\vec{b} \\leftrightarrow (z_1 + z_2)$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "向量与复数的对应关系"}, {"id": "MACRO_08_008_01_A004", "name": "向量旋转与复数乘法的关系", "level": "atomic", "val": 4, "color": "#e84393", "desc": "向量绕原点旋转角度θ对应于复数乘以e^(iθ)，实现几何变换", "formula": "$$\\vec{a} \\text{旋转} \\theta \\leftrightarrow z \\cdot e^{i\\theta}$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "向量与复数的对应关系"}, {"id": "MACRO_08_008_复数运算的向量解释", "name": "复数运算的向量解释", "level": "micro", "val": 9, "color": "#e84393"}, {"id": "MACRO_08_008_02_A001", "name": "复数加法的向量合成", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数加法对应向量坐标相加，几何上为平行四边形法则合成向量", "formula": "$$(a+bi)+(c+di)=(a+c)+(b+d)i$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "复数运算的向量解释"}, {"id": "MACRO_08_008_02_A002", "name": "复数模的向量长度", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数模长对应向量的欧几里得长度，表示原点到点的向量长度", "formula": "$$|a+bi|=\\sqrt{a^2+b^2}$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "复数运算的向量解释"}, {"id": "MACRO_08_008_02_A003", "name": "复数乘法的旋转缩放", "level": "atomic", "val": 4, "color": "#e84393", "desc": "复数相乘对应向量模长相乘、幅角相加，实现旋转与缩放变换", "formula": "$$|z_1z_2|=|z_1||z_2|,\\ \\arg(z_1z_2)=\\arg z_1+\\arg z_2$$", "domain_zh": "向量复数", "macro_topic": "向量解几", "micro_topic": "复数运算的向量解释"}, {"id": "MACRO_08_008_02_A004", "name": "复数共轭的向量反射", "level": "atomic", "val": 4, "color": "#e84393", "desc": "共轭复数对应向量关于实轴对称的镜像反射变换", "formula": "$$\\overline{a+bi}=a-bi$$", "domain_zh": "向量复数", "macro_to 条件", "level": "atomic", "val": 4, "color": "#e84393", "desc": "三点共线时向量满足的比例关系，用于判断三角形顶点是否共线或求解参数", "formula": "$$\\vec{a} = \\lambda \\vec{b} \\ (\\vec{b} \\neq 0)$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量在三角形中的应用"}, {"id": "MACRO_08_007_04_A003", "name": "向量分解定理应用", "level": "atomic", "val": 4, "color": "#e84393", "desc": "将任意向量分解为三角形基底向量的线性组合，用于证明几何关系", "formula": "$$\\vec{c} = \\lambda \\vec{AB} + \\mu \\vec{AC}$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量在三角形中的应用"}, {"id": "MACRO_08_007_04_A004", "name": "向量坐标与三角形面积", "level": "atomic", "val": 4, "color": "#e84393", "desc": "通过向量坐标计算三角形面积，利用叉积绝对值的一半求解", "formula": "$$S = \\frac{1}{2}|x_1y_2 - x_2y_1|$$", "domain_zh": "向量复数", "macro_topic": "向量三角", "micro_topic": "向量在三角形中的应用"}, {"id": "MACRO_01_005_导数的计算方法", "name": "导数的计算方法", "level": "micro", "val": 9, "color": "#e74c3c"}, {"id": "MACRO_01_005_02_A001", "name": "导数的定义", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "函数在某一点的导数定义为函数在该点的瞬时变化率，即函数增量与自变量增量比值的极限。", "formula": "$$f'(x_0) = \\lim_{\\Delta x \\to 0} \\frac{f(x_0 + \\Delta x) - f(x_0)}{\\Delta x}$$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的计算方法"}, {"id": "MACRO_01_005_02_A002", "name": "基本初等函数的导数公式", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "掌握常数函数、幂函数、指数函数、对数函数、三角函数等基本初等函数的导数公式是计算导数的基础。", "formula": "$$(C)'=0, \\quad (x^n)'=nx^{n-1}, \\quad (\\sin x)'=\\cos x, \\quad (e^x)'=e^x, \\quad (\\ln x)'=\\frac{1}{x}$$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的计算方法"}, {"id": "MACRO_01_005_02_A003", "name": "导数的四则运算法则", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "对于两个可导函数的和、差、积、商，其导数可以通过相应的运算法则进行计算。", "formula": "$$(u \\pm v)' = u' \\pm v', \\quad (uv)' = u'v + uv', \\quad \\left(\\frac{u}{v}\\right)' = \\frac{u'v - uv'}{v^2} (v \\neq 0)$$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的计算方法"}, {"id": "MACRO_01_005_02_A004", "name": "复合函数的求导法则（链式法则）", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "如果函数 $y=f(u)$ 和 $u=g(x)$ 都可导，则复合函数 $y=f[g(x)]$ 的导数等于 $f'(u)$ 与 $g'(x)$ 的乘积。", "formula": "$$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx} \\quad \\text{或} \\quad [f(g(x))]' = f'(g(x)) \\cdot g'(x)$$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的计算方法"}, {"id": "MACRO_02_004_03_A001", "name": "裂项相消法基本思想", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "将数列通项拆分为两个分数差的形式，使前n项和中相邻项相互抵消", "formula": "$$\\frac{1}{n(n+k)}=\\frac{1}{k}(\\frac{1}{n}-\\frac{1}{n+k})$$", "domain_zh": "数列", "macro_topic": "数列求和", "micro_topic": "裂项相消法求和"}, {"id": "MACRO_02_004_03_A002", "name": "系数确定方法", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "通过待定系数法建立方程组确定拆分系数", "formula": "$$\\frac{1}{n(n+1)}=\\frac{A}{n}+\\frac{B}{n+1} \\Rightarrow A=1,B=-1$$", "domain_zh": "数列", "macro_topic": "数列求和", "micro_topic": "裂项相消法求和"}, {"id": "MACRO_02_004_03_A003", "name": "典型裂项形式", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "常见分式结构的裂项转换公式", "formula": "$$\\frac{1}{n^2-1}=\\frac{1}{2}(\\frac{1}{n-1}-\\frac{1}{n+1})$$", "domain_zh": "数列", "macro_topic": "数列求和", "micro_topic": "裂项相消法求和"}, {"id": "MACRO_02_004_03_A004", "name": "相消求和公式", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "前n项和的最终表达式推导", "formula": "$$\\sum_{k=1}^n \\frac{1}{k(k+1)}=1-\\frac{1}{n+1}$$", "domain_zh": "数列", "macro_topic": "数列求和", "micro_topic": "裂项相消法求和"}, {"id": "MACRO_01_005_导数的应用（单调性与极值）", "name": "导数的应用（单调性与极值）", "level": "micro", "val": 9, "color": "#e74c3c"}, {"id": "MACRO_01_005_03_A001", "name": "导数与函数单调性的关系", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "导数符号决定函数单调性，导数大于0时函数单调递增，小于0时单调递减", "formula": "$f'(x) > 0 \\Rightarrow f(x)\\text{单调递增};\\quad f'(x) < 0 \\Rightarrow f(x)\\text{单调递减}$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的应用（单调性与极值）"}, {"id": "MACRO_01_005_03_A002", "name": "极值点的定义", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "函数在某点取得局部最大值或最小值，称为极值点", "formula": "$f(a) \\geq f(x)\\text{（极大值）} \\quad \\text{或} \\quad f(a) \\leq f(x)\\text{（极小值）}$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的应用（单调性与极值）"}, {"id": "MACRO_01_005_03_A003", "name": "极值点的必要条件", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "可导函数在极值点处导数为零或导数不存在", "formula": "$f'(c) = 0 \\quad \\text{或} \\quad f'(c)\\text{不存在}$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的应用（单调性与极值）"}, {"id": "MACRO_01_005_03_A004", "name": "极值的第二充分条件", "level": "atomic", "val": 4, "color": "#e74c3c", "desc": "通过二阶导数符号判断极值类型，二阶导数存在时成立", "formula": "$f'(c) = 0 \\text{且} f''(c) > 0 \\Rightarrow \\text{极小值};\\quad f'(c) = 0 \\text{且} f''(c) < 0 \\Rightarrow \\text{极大值}$", "domain_zh": "函数与导数", "macro_topic": "导数概念", "micro_topic": "导数的应用（单调性与极值）"}, {"id": "MACRO_02_005", "name": "递推数列", "level": "macro", "val": 16, "color": "#e67e22"}, {"id": "MACRO_02_005_递推数列的基本概念", "name": "递推数列的基本概念", "level": "micro", "val": 9, "color": "#e67e22"}, {"id": "MACRO_02_005_01_A001", "name": "递推数列定义", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "通过递推公式表示相邻项关系的数列，需给定初始项", "formula": "$a_{n+1} = f(a_n)$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的基本概念"}, {"id": "MACRO_02_005_01_A002", "name": "通项公式求解", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "由递推关系推导出第n项与n的直接表达式", "formula": "$a_n = a_1 + \\sum_{k=1}^{n-1} d_k$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的基本概念"}, {"id": "MACRO_02_005_01_A003", "name": "初始条件作用", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "递推公式配合初始值唯一确定数列各项", "formula": "$a_1 = c \\in \\mathbb{R}$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的基本概念"}, {"id": "MACRO_02_005_01_A004", "name": "递推类型分类", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "按递推形式分为线性/非线性、常系数/变系数等类型", "formula": "$a_{n+1} + p(n)a_n = q(n)$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的基本概念"}, {"id": "MACRO_03_002_三角函数的图像应用", "name": "三角函数的图像应用", "level": "micro", "val": 9, "color": "#f1c40f"}, {"id": "MACRO_03_002_03_A001", "name": "正弦函数图像特征", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "正弦函数y=sinx的图像为标准正弦曲线，具有周期性、对称性和有界性特征，关键点包括最高点(π/2,1)、最低点(3π/2,-1)和零点", "formula": "$y=\\sin x$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数的图像应用"}, {"id": "MACRO_03_002_03_A002", "name": "余弦函数图像特征", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "余弦函数y=cosx的图像为标准余弦曲线，与正弦曲线形状相同但相位相差π/2，关键点包括最高点(0,1)、最低点(π,-1)和零点(π/2,0)", "formula": "$y=\\cos x$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数的图像应用"}, {"id": "MACRO_03_002_03_A003", "name": "振幅与周期变换", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "函数y=Asin(Bx)的图像中，A决定振幅（垂直伸缩），B决定周期（水平伸缩），周期T=2π/|B|", "formula": "$T=\\frac{2\\pi}{|B|}$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数的图像应用"}, {"id": "MACRO_03_002_03_A004", "name": "相位平移规律", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "函数y=sin(Bx+C)的图像水平平移量为-C/B，当C>0时图像左移，C<0时右移", "formula": "$y=\\sin(Bx+C)$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数的图像应用"}, {"id": "MACRO_03_002_三角函数图像的对称性与周期性", "name": "三角函数图像的对称性与周期性", "level": "micro", "val": 9, "color": "#f1c40f"}, {"id": "MACRO_03_002_04_A001", "name": "正弦函数的奇函数性", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "正弦函数图像关于原点对称，满足$$ \\sin(-x) = -\\sin x $$", "formula": "$$\\sin(-x) = -\\sin x$$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数图像的对称性与周期性"}, {"id": "MACRO_03_002_04_A002", "name": "余弦函数的偶函数性", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "余弦函数图像关于y轴对称，满足$$ \\cos(-x) = \\cos x $$", "formula": "$$\\cos(-x) = \\cos x$$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数图像的对称性与周期性"}, {"id": "MACRO_03_002_04_A003", "name": "三角函数的基本周期", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "正弦、余弦函数周期为$$ 2\\pi $$，正切函数周期为$$ \\pi $$，满足$$ \\sin(x+2\\pi) = \\sin x $$，$$ \\tan(x+\\pi) = \\tan x $$", "formula": "$$\\sin(x+2\\pi) = \\sin x$$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数图像的对称性与周期性"}, {"id": "MACRO_03_002_04_A004", "name": "一般正弦函数的周期与对称轴", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "函数$$ y = A\\sin(Bx + C) $$的周期为$$ \\frac{2\\pi}{|B|} $$，其对称轴方程为$$ x = \\frac{\\frac{\\pi}{2} + k\\pi - C}{B} $$（$$ k \\in \\mathbb{Z} $$）", "formula": "$$x = \\frac{\\frac{\\pi}{2} + k\\pi - C}{B}$$", "domain_zh": "三角函数", "macro_topic": "三角图像", "micro_topic": "三角函数图像的对称性与周期性"}, {"id": "MACRO_03_007_正弦定理与面积", "name": "正弦定理与面积", "level": "micro", "val": 9, "color": "#f1c40f"}, {"id": "MACRO_03_007_02_A001", "name": "正弦定理", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "三角形中各边与其对角正弦的比值相等", "formula": "$$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C} = 2R$$", "domain_zh": "三角函数", "macro_topic": "三角面积", "micro_topic": "正弦定理与面积"}, {"id": "MACRO_03_007_02_A002", "name": "三角形面积公式", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "利用两边及其夹角正弦计算面积", "formula": "$$S = \\frac{1}{2}ab\\sin C$$", "domain_zh": "三角函数", "macro_topic": "三角面积", "micro_topic": "正弦定理与面积"}, {"id": "MACRO_03_007_02_A003", "name": "已知两角及任意边解三角形", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "通过内角和定理与正弦定理求解未知边角", "formula": "$$a = \\frac{b\\sin A}{\\sin B}$$", "domain_zh": "三角函数", "macro_topic": "三角面积", "micro_topic": "正弦定理与面积"}, {"id": "MACRO_03_007_02_A004", "name": "外接圆半径关系", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "边长与对应角正弦的比值等于外接圆直径", "formula": "$$R = \\frac{a}{2\\sin A}$$", "domain_zh": "三角函数", "macro_topic": "三角面积", "micro_topic": "正弦定理与面积"}, {"id": "MACRO_02_005_常见递推数列类型", "name": "常见递推数列类型", "level": "micro", "val": 9, "color": "#e67e22"}, {"id": "MACRO_02_005_02_A001", "name": "等差数列", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "相邻两项之差为常数的数列", "formula": "$$a_{n+1} - a_n = d$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "常见递推数列类型"}, {"id": "MACRO_02_005_02_A002", "name": "等比数列", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "相邻两项之比为常数的数列", "formula": "$$\\frac{a_{n+1}}{a_n} = q$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "常见递推数列类型"}, {"id": "MACRO_02_005_02_A003", "name": "二阶线性递推数列", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "递推关系为二阶线性齐次递推式的数列", "formula": "$$a_{n+2} = p a_{n+1} + q a_n$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "常见递推数列类型"}, {"id": "MACRO_02_005_02_A004", "name": "分式递推数列", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "递推关系中含有分式形式的数列", "formula": "$$a_{n+1} = \\frac{k a_n + b}{c a_n + d}$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "常见递推数列类型"}, {"id": "MACRO_04_002_表面积与体积的综合应用", "name": "表面积与体积的综合应用", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_002_03_A001", "name": "柱体表面积与体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算棱柱或圆柱的表面积与体积，表面积为侧面积与两底面积之和，体积为底面积乘高", "formula": "$S_{表}=S_{侧}+2S_{底},\\ V=S_{底}h$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "表面积与体积的综合应用"}, {"id": "MACRO_04_002_03_A002", "name": "锥体表面积与体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算棱锥或圆锥的表面积与体积，表面积为侧面积与底面积之和，体积为三分之一底面积乘高", "formula": "$S_{表}=S_{侧}+S_{底},\\ V=\\frac{1}{3}S_{底}h$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "表面积与体积的综合应用"}, {"id": "MACRO_04_002_03_A003", "name": "台体表面积与体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算棱台或圆台的表面积与体积，表面积为侧面积与上下底面积之和，体积为三分之一高与上下底面积平方根积的和", "formula": "$S_{表}=S_{侧}+S_{上}+S_{下},\\ V=\\frac{1}{3}h(S_{上}+S_{下}+\\sqrt{S_{上}S_{下}})$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "表面积与体积的综合应用"}, {"id": "MACRO_04_002_03_A004", "name": "球体表面积与体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算球体的表面积与体积，表面积为四倍圆周率半径平方，体积为四三分之四倍圆周率半径立方", "formula": "$S_{表}=4\\pi r^2,\\ V=\\frac{4}{3}\\pi r^3$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "表面积与体积的综合应用"}, {"id": "MACRO_02_005_递推数列的通项公式求解", "name": "递推数列的通项公式求解", "level": "micro", "val": 9, "color": "#e67e22"}, {"id": "MACRO_02_005_03_A001", "name": "递推数列定义", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "通过前一项或多项推导后续项的数列", "formula": "$a_{n+1} = f(a_n, a_{n-1}, \\cdots)$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的通项公式求解"}, {"id": "MACRO_02_005_03_A002", "name": "等差数列通项公式", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "公差为d的等差数列通项表达式", "formula": "$a_n = a_1 + (n-1)d$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的通项公式求解"}, {"id": "MACRO_02_005_03_A003", "name": "等比数列通项公式", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "公比为r的等比数列通项表达式", "formula": "$a_n = a_1 \\cdot r^{n-1}$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的通项公式求解"}, {"id": "MACRO_02_005_03_A004", "name": "二阶线性递推通项公式", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "特征方程法求解二阶齐次递推通项", "formula": "$a_n = C_1 r_1^n + C_2 r_2^n$（其中r₁,r₂为特征根）", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的通项公式求解"}, {"id": "MACRO_02_005_递推数列的应用与综合题", "name": "递推数列的应用与综合题", "level": "micro", "val": 9, "color": "#e67e22"}, {"id": "MACRO_02_005_04_A001", "name": "递推数列的定义与表示", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "掌握递推数列的基本概念，即数列的每一项由其前一项或前几项通过特定关系式（递推公式）确定。理解$a_{n+1}=f(a_n)$或$a_{n+2}=f(a_{n+1},a_n)$等形式，并能根据递推关系写出数列的前若干项。", "formula": "$$a_{n+1}=f(a_n) \\quad \\text{或} \\quad a_{n+k}=f(a_{n+k-1},\\dots,a_n)$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的应用与综合题"}, {"id": "MACRO_02_005_04_A002", "name": "常见递推数列的求解方法", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "掌握等差型$a_{n+1}=a_n+d$、等比型$a_{n+1}=qa_n$、线性递推$a_{n+1}=pa_n+q$（$p\\neq1$）等基本类型的求解方法，能通过构造新数列或迭代法求通项公式。", "formula": "$$a_{n+1}=pa_n+q \\Rightarrow a_{n+1}+\\frac{q}{p-1}=p\\left(a_n+\\frac{q}{p-1}\\right)$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的应用与综合题"}, {"id": "MACRO_02_005_04_A003", "name": "特征根法求解二阶线性递推", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "对于二阶线性齐次递推$a_{n+2}=pa_{n+1}+qa_n$，能通过特征方程$x^2=px+q$求特征根，根据根的情况（相异实根、重根、共轭复根）写出通项公式的一般形式。", "formula": "$$a_{n+2}=pa_{n+1}+qa_n \\Rightarrow x^2-px-q=0 \\Rightarrow a_n=C_1\\lambda_1^n+C_2\\lambda_2^n$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的应用与综合题"}, {"id": "MACRO_02_005_04_A004", "name": "递推数列在实际问题中的建模", "level": "atomic", "val": 4, "color": "#e67e22", "desc": "能将增长率、分期付款、细胞分裂等实际问题转化为递推数列模型，建立递推关系，并利用递推数列的求解方法分析问题、预测趋势或求解特定项。", "formula": "$$\\text{如：人口增长 } P_{n+1}=P_n(1+r)-m \\quad \\text{（$r$为增长率，$m$为迁出量）}$$", "domain_zh": "数列", "macro_topic": "递推数列", "micro_topic": "递推数列的应用与综合题"}, {"id": "MACRO_04_008_动态几何与折叠问题", "name": "动态几何与折叠问题", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_008_02_A001", "name": "折叠中的对称性质", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "图形折叠的本质是全等变换，折叠前后的对应部分关于折痕成轴对称。对应点的连线被折痕垂直平分，对应线段相等，对应角相等。", "formula": "$$\\triangle A'B'C' \\cong \\triangle ABC, \\quad l \\text{为} AA' \\text{的垂直平分线}$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "动态几何与折叠问题"}, {"id": "MACRO_04_008_02_A002", "name": "折痕与动点轨迹", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在折叠过程中，满足特定条件的动点（如某条线段的中点）的轨迹常是直线或圆弧。分析时需结合折叠对称性，利用几何不变量确定轨迹。", "formula": "$$\\text{若} P \\text{满足} PA + PB = \\text{定值}, \\text{则轨迹可能为椭圆弧}$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "动态几何与折叠问题"}, {"id": "MACRO_04_008_02_A003", "name": "折叠中的最值问题", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "通过折叠构造对称点，将折线路径（如“将军饮马”模型）转化为直线段，利用“两点之间线段最短”或“垂线段最短”求最值。", "formula": "$$\\min(AP + PB) = A'B \\quad (A' \\text{为} A \\text{关于折痕的对称点})$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "动态几何与折叠问题"}, {"id": "MACRO_04_008_02_A004", "name": "折叠与相似三角形", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "折叠常产生重叠的相似三角形，利用对应角相等或公共角建立相似关系，结合比例线段或勾股定理求解未知长度。", "formula": "$$\\triangle AEF \\sim \\triangle 次不等式"}, {"id": "MACRO_07_004_02_A002", "name": "判别式的参数相关性分析", "level": "atomic", "val": 4, "color": "#9b59b6", "desc": "通过判别式Δ = b²-4ac的符号判断方程根的情况，进而确定解集结构", "formula": "$$ \\Delta = b^2 - 4ac $$ 当 $ \\Delta > 0 $ 时有两个不同实根", "domain_zh": "集合不等式", "macro_topic": "二次不等式", "micro_topic": "含参数的一元二次不等式"}, {"id": "MACRO_07_004_02_A003", "name": "参数导致的根序关系变化", "level": "atomic", "val": 4, "color": "#9b59b6", "desc": "当参数影响根的大小关系时，需分界讨论x₁与x₂的位置关系", "formula": "$$ x_{1,2} = \\frac{-b \\pm \\sqrt{\\Delta}}{2a} $$ 当 $ b^2 > 4ac $ 时需比较根的大小", "domain_zh": "集合不等式", "macro_topic": "二次不等式", "micro_topic": "含参数的一元二次不等式"}, {"id": "MACRO_07_004_02_A004", "name": "参数驱动的解集区间转换", "level": "atomic", "val": 4, "color": "#9b59b6", "desc": "参数变化导致解集区间形态转换（空集/全集/开区间）", "formula": "$$ \\text{当} \\begin{cases} a > 0 \\\\ \\Delta > 0 \\end{cases} \\Rightarrow x \\in (-\\infty, x_1) \\cup (x_2, +\\infty) $$", "domain_zh": "集合不等式", "macro_topic": "二次不等式", "micro_topic": "含参数的一元二次不等式"}, {"id": "MACRO_07_004_一元二次不等式与集合的关系", "name": "一元二次不等式与集合的关系", "level": "micro", "val": 9, "color": "#9b59b6"}, {"id": "MACRO_07_004_03_A001", "name": "一元二次不等式的标准形式", "level": "atomic", "val": 4, "color": "#9b59b6", "desc": "一元二次不等式通常化为标准形式 $ax^2 + bx + c > 0$（或 $<0$, $\\geq 0$, $\\leq 0$），其中 $a \\neq 0$。解集与对应二次方程 $ax^2 + bx + c = 0$ 的根及抛物线开口方向密切相关。", "formula": "$$ax^2 + bx + c > 0 \\quad (a \\neq 0)$$", "domain_zh": "集合不等式", "macro_topic": "二次不等式", "micro_topic": "一元二次不等式与集合的关系"}, {"id": "MACRO_07_004_03_A002", "name": "判别式与解集关系", "level": "atomic", "val": 4, "color": "#9b59b6", "desc": "设 $\\Delta = b^2 - 4ac$，当 $a > 0$ 时：若 $\\Delta > 0$，方程有两不等实根 $x_1, x_2$，则 $ax^2 + bx + c > 0$ 的解集为 $(-\\infty, x_1) \\cup (x_2, +\\infty)$；若 $\\Delta = 0$，解集为 $x \\neq -\\frac{b}{2a}$；若 $\\Delta < 0$，解集为全体实数 $\\mathbb{R}$。", "formula": "$$\\Delta = b^2 - 4ac, \\quad x_{1,2} = \\frac{-b \\pm \\sqrt{\\Delta}}{2a}$$", "domain_zh": "集合不等式", "macro_topic": "二次不等式", "micro_topic": "一元二次不等式与集合的关系"}, {"id": "MACRO_07_004_03_A003", "name": let formulaRenderToken = 0;

function normalizeHex(value, fallback) {
  if (typeof value !== 'string') {
    return fallback;
  }
  const text = value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(text)) {
    return text;
  }
  if (/^#[0-9a-fA-F]{3}$/.test(text)) {
    return `#${text[1]}${text[1]}${text[2]}${text[2]}${text[3]}${text[3]}`;
  }
  return fallback;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function mergeTheme(payload) {
  if (!payload || typeof payload !== 'object') {
    return {...activeTheme};
  }
  const merged = {...activeTheme};
  merged.isDark = Boolean(payload.isDark);
  merged.surface = normalizeHex(payload.surface, merged.surface);
  merged.surfaceContainer = normalizeHex(payload.surfaceContainer, merged.surfaceContainer);
  merged.surfaceContainerHigh = normalizeHex(payload.surfaceContainerHigh, merged.surfaceContainerHigh);
  merged.surfaceContainerHighest = normalizeHex(payload.surfaceContainerHighest, merged.surfaceContainerHighest);
  merged.onSurface = normalizeHex(payload.onSurface, merged.onSurface);
  merged.onSurfaceVariant = normalizeHex(payload.onSurfaceVariant, merged.onSurfaceVariant);
  merged.primary = normalizeHex(payload.primary, merged.primary);
  merged.secondary = normalizeHex(payload.secondary, merged.secondary);
  merged.outline = normalizeHex(payload.outline, merged.outline);
  merged.outlineVariant = normalizeHex(payload.outlineVariant, merged.outlineVariant);
  merged.scrim = normalizeHex(payload.scrim, merged.scrim);
  return merged;
}

function hexRgb(hex) {
  const value = normalizeHex(hex, '#777777');
  return [
    parseInt(value.slice(1, 3), 16),
    parseInt(value.slice(3, 5), 16),
    parseInt(value.slice(5, 7), 16),
  ];
}

function rgba(hex, alpha) {
  const [r, g, b] = hexRgb(hex);
  const clamped = clamp(alpha, 0, 1);
  return `rgba(${r},${g},${b},${clamped})`;
}

function buildVisualTokens(theme) {
  return {
    linkColor: rgba(theme.onSurface, theme.isDark ? 0.16 : 0.06),
    linkHighlight: rgba(theme.onSurface, theme.isDark ? 0.48 : 0.30),
    nodeStroke: rgba(theme.outline, theme.isDark ? 0.72 : 0.58),
    labelBackground: theme.isDark ? 'rgba(17,19,21,0.88)' : 'rgba(255,255,255,0.85)',
    labelBackgroundDim: theme.isDark ? 'rgba(17,19,21,0.45)' : 'rgba(255,255,255,0.30)',
    labelText: theme.isDark ? 'rgba(242,243,244,0.90)' : 'rgba(0,0,0,0.86)',
    labelTextDim: theme.isDark ? 'rgba(180,188,199,0.25)' : 'rgba(0,0,0,0.10)'
  };
}

function applyThemeToDocument(theme) {
  const root = document.documentElement;
  root.dataset.theme = theme.isDark ? 'dark' : 'light';
  root.style.setProperty('--surface', theme.surface);
  root.style.setProperty('--surface-container', theme.surfaceContainer);
  root.style.setProperty('--surface-container-high', theme.surfaceContainerHigh);
  root.style.setProperty('--surface-container-highest', theme.surfaceContainerHighest);
  root.style.setProperty('--on-surface', theme.onSurface);
  root.style.setProperty('--on-surface-variant', theme.onSurfaceVariant);
  root.style.setProperty('--primary', theme.primary);
  root.style.setProperty('--secondary', theme.secondary);
  root.style.setProperty('--outline', theme.outline);
  root.style.setProperty('--outline-variant', theme.outlineVariant);
  root.style.setProperty('--scrim', theme.scrim);
}

function refreshGraphTheme() {
  visualTokens = buildVisualTokens(activeTheme);
  const graph = window.__ASAKA_GRAPH;
  if (!graph) {
    return;
  }
  graph.linkColor(l => hlL.has(l) ? visualTokens.linkHighlight : visualTokens.linkColor);
  if (typeof graph.d3ReheatSimulation === 'function') {
    graph.d3ReheatSimulation();
  }
}

function typesetFormula(element) {
  if (!window.MathJax || typeof window.MathJax.typesetPromise !== 'function') {
    return;
  }
  formulaRenderToken += 1;
  const token = formulaRenderToken;
  window.MathJax.typesetPromise([element]).catch(() => {}).finally(() => {
    if (token !== formulaRenderToken) {
      return;
    }
  });
}

function renderFormulaText(formulaText) {
  const panelFormula = document.getElementById('pf');
  const text = typeof formulaText === 'string' ? formulaText.trim() : '';
  activeFormula = text;
  if (!text) {
    panelFormula.textContent = '';
    panelFormula.style.display = 'none';
    return;
  }
  panelFormula.textContent = text;
  panelFormula.style.display = 'block';
  typesetFormula(panelFormula);
}

window.__ASAKA_SET_THEME = function(payload) {
  activeTheme = mergeTheme(payload);
  applyThemeToDocument(activeTheme);
  refreshGraphTheme();
  if (activeFormula) {
    renderFormulaText(activeFormula);
  }
};

const el = document.getElementById('graph');
const nodeById = new Map();
const macroNodesById = new Map();
const macroDomainById = new Map();
const macroByTopic = new Map();
const macroByDomainTopic = new Map();
const macroByDomain = new Map();
const macroIdPattern = /MACRO_\d{2}_\d{3}/;

function normalizeKey(value) {
  return (value || '').toString().toLowerCase().replace(/\s+/g, '').trim();
}

function safeText(value) {
  return typeof value === 'string' ? value : '';
}

for (const node of D.nodes) {
  if (!node || typeof node !== 'object') {
    continue;
  }
  const id = safeText(node.id).trim();
  if (!id) {
    continue;
  }
  nodeById.set(id, node);
  if (node.level === 'macro') {
    macroNodesById.set(id, node);
  }
}

for (const link of D.links) {
  const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
  const targetId = typeof link.target === 'object' ? link.target.id : link.target;
  const sourceNode = nodeById.get(sourceId);
  const targetNode = nodeById.get(targetId);

  if (!sourceNode || !targetNode) {
    continue;
  }
  if (sourceNode.level === 'domain' && targetNode.level === 'macro') {
    macroDomainById.set(targetNode.id, safeText(sourceNode.name).trim());
  } else if (sourceNode.level === 'macro' && targetNode.level === 'domain') {
    macroDomainById.set(sourceNode.id, safeText(targetNode.name).trim());
  }
}

for (const macroNode of macroNodesById.values()) {
  const macroId = safeText(macroNode.id).trim();
  if (!macroId) {
    continue;
  }
  const topic = safeText(macroNode.name).trim();
  const domain = safeText(macroDomainById.get(macroId)).trim();
  const topicKey = normalizeKey(topic);
  const domainKey = normalizeKey(domain);

  if (topicKey && !macroByTopic.has(topicKey)) {
    macroByTopic.set(topicKey, macroNode);
  }
  if (domainKey && !macroByDomain.has(domainKey)) {
    macroByDomain.set(domainKey, macroNode);
  }
  if (domainKey && topicKey) {
    macroByDomainTopic.set(`${domainKey}|${topicKey}`, macroNode);
  }
}

function resolveMacroModuleFromNode(node) {
  if (!node || typeof node !== 'object') {
    return {moduleId: '', moduleResolved: false, macroNode: null};
  }

  const sourceId = safeText(node.id).trim();
  const sourceLevel = safeText(node.level).trim();
  if (sourceLevel === 'macro' && sourceId) {
    return {
      moduleId: sourceId,
      moduleResolved: true,
      macroNode: macroNodesById.get(sourceId) || node,
    };
  }

  if (sourceId) {
    const matched = sourceId.match(macroIdPattern);
    if (matched && matched[0]) {
      const macroId = matched[0];
      const macroNode = macroNodesById.get(macroId) || null;
      return {
        moduleId: macroId,
        moduleResolved: macroNode != null,
        macroNode,
      };
    }
  }

  // Domain/root nodes are intentionally treated as "unresolved"
  // to avoid accidental auto-binding to an arbitrary macro module.
  if (sourceLevel === 'domain' || sourceLevel === 'root') {
    return {moduleId: '', moduleResolved: false, macroNode: null};
  }

  const sourceDomain = safeText(node.domain_zh || (sourceLevel === 'domain' ? node.name : '')).trim();
  const sourceTopic = safeText(
    node.macro_topic || (sourceLevel === 'macro' ? node.name : ''),
  ).trim();
  const domainKey = normalizeKey(sourceDomain);
  const topicKey = normalizeKey(sourceTopic);

  if (domainKey && topicKey) {
    const macroNode = macroByDomainTopic.get(`${domainKey}|${topicKey}`);
    if (macroNode) {
      return {
        moduleId: safeText(macroNode.id).trim(),
        moduleResolved: true,
        macroNode,
      };
    }
  }

  if (topicKey) {
    const macroNode = macroByTopic.get(topicKey);
    if (macroNode) {
      return {
        moduleId: safeText(macroNode.id).trim(),
        moduleResolved: true,
        macroNode,
      };
    }
  }

  return {moduleId: '', moduleResolved: false, macroNode: null};
}

function emitRoadmapNodeClick(n){
  const resolved = resolveMacroModuleFromNode(n);
  const moduleId = safeText(resolved.moduleId).trim();
  const moduleNode = resolved.macroNode;
  const moduleDomain = moduleId ? safeText(macroDomainById.get(moduleId)).trim() : '';
  const moduleTopic = moduleNode ? safeText(moduleNode.name).trim() : '';
  const eventId = `${Date.now()}_${Math.random().toString(16).slice(2, 10)}`;
  const payload = {
    type: 'roadmap_node_click',
    eventId,
    sourceNodeId: n.id || '',
    sourceLevel: n.level || '',
    sourceName: n.name || '',
    moduleId,
    moduleResolved: !!resolved.moduleResolved,
    // compatibility fields for older readers
    level: n.level || '',
    name: n.name || '',
    domainZh: n.domain_zh || moduleDomain || '',
    macroTopic: n.macro_topic || moduleTopic || '',
    microTopic: n.micro_topic || ''
  };
  const payloadText = JSON.stringify(payload);

  try {
    if (window.GaokaoBridge && typeof window.GaokaoBridge.postMessage === 'function') {
      window.GaokaoBridge.postMessage(payloadText);
    }
  } catch (_) {}

  try {
    if (window.chrome && window.chrome.webview && typeof window.chrome.webview.postMessage === 'function') {
      window.chrome.webview.postMessage(payloadText);
    }
  } catch (_) {}

  try {
    if (window.webkit &&
        window.webkit.messageHandlers &&
        window.webkit.messageHandlers.GaokaoBridge &&
        typeof window.webkit.messageHandlers.GaokaoBridge.postMessage === 'function') {
      window.webkit.messageHandlers.GaokaoBridge.postMessage(payloadText);
    }
  } catch (_) {}

  // Linux desktop fallback bridge via URL fragment.
  try {
    window.location.hash = `asaka_bridge=${encodeURIComponent(payloadText)}&ts=${Date.now()}`;
  } catch (_) {}
}

const G = window.__ASAKA_GRAPH = ForceGraph()(el)
  .graphData(D)
  .width(el.offsetWidth)
  .height(el.offsetHeight-40)
  .linkCurvature(0)
  .linkWidth(l => hlL.has(l)?1.5:0.3)
  .linkColor(l => hlL.has(l)?visualTokens.linkHighlight:visualTokens.linkColor)
  .linkDirectionalParticles(0)

  .nodeCanvasObject((n, ctx, s) => {
    const on = hl.has(n);
    const dim = hl.size>0 && !on;
    const isSel = n===sel;

    const r = Math.sqrt(Math.max(0,n.val||1))*1.6;
    let a = {root:1, domain:0.9, macro:0.7, micro:0.5, atomic:0.35}[n.level]||0.35;
    if(dim) a=0.05;
    if(on) a=1;

    // circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, on||isSel?r*1.2:r, 0, 2*Math.PI);
    const [cr,cg,cb] = hexRgb(n.color);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${a})`;
    ctx.fill();

    if(on||isSel){
      ctx.strokeStyle = visualTokens.nodeStroke;
      ctx.lineWidth = 0.8/s;
      ctx.stroke();
    }

    // label
    const th = {root:0, domain:0, macro:1, micro:2.5, atomic:4}[n.level]??4;
    if(s>=th || on || isSel){
      const fs = Math.min(13, Math.max(3, 10/s));
      ctx.font = `${fs}px 'Courier New',monospace`;
      const label = n.name||'';
      const tw = ctx.measureText(label).width;
      const yOff = (on||isSel?r*1.2:r) + fs*0.7;

      ctx.fillStyle = dim?visualTokens.labelBackgroundDim:visualTokens.labelBackground;
      ctx.fillRect(n.x-tw/2-2/s, n.y+yOff-fs/2-1/s, tw+4/s, fs+2/s);

      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = dim?visualTokens.labelTextDim:visualTokens.labelText;
      ctx.fillText(label, n.x, n.y+yOff);
    }
  })
  .nodeCanvasObjectMode(()=>'replace')
  .nodePointerAreaPaint((n,c,ctx) => {
    ctx.beginPath(); ctx.arc(n.x,n.y,Math.sqrt(Math.max(0,n.val||1))*1.6+4,0,2*Math.PI);
    ctx.fillStyle=c; ctx.fill();
  })

  .onNodeHover(n => {
    hl.clear(); hlL.clear();
    if(n){
      hl.add(n);
      const nbs=nb[n.id];
      if(nbs) nbs.forEach(id=>{const nd=D.nodes.find(x=>x.id===id);if(nd)hl.add(nd)});
      D.links.forEach(l=>{
        const s=typeof l.source==='object'?l.source.id:l.source;
        const t=typeof l.target==='object'?l.target.id:l.target;
        if(s===n.id||t===n.id) hlL.add(l);
      });
    }
    el.style.cursor=n?'pointer':'default';
  })

  .onNodeClick(n => {
    if (n) {
      emitRoadmapNodeClick(n);
    }
    sel=n;
    document.getElementById('pt').textContent=n.name||n.id;
    document.getElementById('pp').textContent=[n.domain_zh,n.macro_topic,n.micro_topic].filter(Boolean).join(' > ')||n.level||'';
    document.getElementById('pd').textContent=n.desc||'—';
    renderFormulaText(n.formula || '');
    document.getElementById('panel').style.display='block';
    G.centerAt(n.x,n.y,500);
    G.zoom(Math.max(G.zoom(),5),500);
  })

  .onBackgroundClick(()=>{
    sel=null; hl.clear(); hlL.clear();
    activeFormula = '';
    document.getElementById('panel').style.display='none';
  });

G.d3Force('charge').strength(-140).distanceMax(350);
G.d3Force('link').distance(l=>{
  const s=typeof l.source==='object'?l.source:D.nodes.find(x=>x.id===l.source);
  if(!s)return 50;
  return {root:90,domain:70,macro:45,micro:30}[s.level]||25;
});

setTimeout(()=>G.zoomToFit(500,40),1200);

document.getElementById('zi').onclick=()=>G.zoom(G.zoom()*1.5,200);
document.getElementById('zo').onclick=()=>G.zoom(G.zoom()/1.5,200);
document.getElementById('zf').onclick=()=>G.zoomToFit(400,30);

document.getElementById('search').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  hl.clear(); hlL.clear();
  if(!q) return;
  D.nodes.forEach(n=>{if((n.name||'').toLowerCase().includes(q)) hl.add(n)});
  if(hl.size===1){const t=[...hl][0];G.centerAt(t.x,t.y,400);G.zoom(5,400)}
});

window.addEventListener('resize',()=>G.width(el.offsetWidth).height(el.offsetHeight-40));

refreshGraphTheme();
</script>
</body>
</html>
