macro_topic": "三角压轴", "micro_topic": "三角函数的最值与取值范围"}, {"id": "MACRO_03_008_02_A004", "name": "含参数的三角函数取值范围", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "当三角函数中含有参数时，需根据参数的取值范围讨论函数的值域，通常结合三角函数的周期性和有界性进行分析", "formula": "$$ 例如：y = \\sin x + k, \\quad 根据k的取值范围确定y \\in [k-1, k+1] $$", "domain_zh": "三角函数", "macro_topic": "三角压轴", "micro_topic": "三角函数的最值与取值范围"}, {"id": "MACRO_03_008_三角恒等变换与解三角形综合", "name": "三角恒等变换与解三角形综合", "level": "micro", "val": 9, "color": "#f1c40f"}, {"id": "MACRO_03_008_03_A001", "name": "和角公式", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "两角和与差的三角函数展开公式", "formula": "$$\\sin(A\\pm B)=\\sin A\\cos B\\pm \\cos A\\sin B$$ $$\\cos(A\\pm B)=\\cos A\\cos B\\mp \\sin A\\sin B$$", "domain_zh": "三角函数", "macro_topic": "三角压轴", "micro_topic": "三角恒等变换与解三角形综合"}, {"id": "MACRO_03_008_03_A002", "name": "倍角公式", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "二倍角的三角函数表达式", "formula": "$$\\sin 2A=2\\sin A\\cos A$$ $$\\cos 2A=\\cos^2 A-\\sin^2 A=2\\cos^2 A-1=1-2\\sin^2 A$$", "domain_zh": "三角函数", "macro_topic": "三角压轴", "micro_topic": "三角恒等变换与解三角形综合"}, {"id": "MACRO_03_008_03_A003", "name": "正弦定理", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "三角形中边角关系的基本定理", "formula": "$$\\frac{a}{\\sin A}=\\frac{b}{\\sin B}=\\frac{c}{\\sin C}=2R$$", "domain_zh": "三角函数", "macro_topic": "三角压轴", "micro_topic": "三角恒等变换与解三角形综合"}, {"id": "MACRO_03_008_03_A004", "name": "余弦定理", "level": "atomic", "val": 4, "color": "#f1c40f", "desc": "三角形边长与余弦值的定量关系", "formula": "$$c^2=a^2+b^2-2ab\\cos C$$", "domain_zh": "三角函数", "macro_topic": "三角压轴", "micro_topic": "三角恒等变换与解三角形综合"}, {"id": "MACRO_04_003", "name": "位置关系", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_003_空间点、直线、平面的位置关系", "name": "空间点、直线、平面的位置关系", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_003_01_A001", "name": "点与直线的位置关系", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "点在直线上或点不在直线上", "formula": "$$\\text{点}P(x_0,y_0,z_0)\\text{在直线}L:\\frac{x-x_1}{a}=\\frac{y-y_1}{b}=\\frac{z-z_1}{c}\\text{上当且仅当}\\frac{x_0-x_1}{a}=\\frac{y_0-y_1}{b}=\\frac{z_0-z_1}{c}$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间点、直线、平面的位置关系"}, {"id": "MACRO_04_003_01_A002", "name": "直线与平面的位置关系", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "直线在平面内、直线与平面平行或直线与平面相交", "formula": "$$\\text{直线}L:\\frac{x-x_0}{a}=\\frac{y-y_0}{b}=\\frac{z-z_0}{c}\\text{与平面}\\pi:Ax+By+Cz+D=0\\text{的位置关系由方程组}\\begin{cases} A(x_0+at)+B(y_0+bt)+C(z_0+ct)+D=0 \\\\ \\frac{x-x_0}{a}=\\frac{y-y_0}{b}=\\frac{z-z_0}{c} \\end{cases}\\text{的解决定}$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间点、直线、平面的位置关系"}, {"id": "MACRO_04_003_01_A003", "name": "平面与平面的位置关系", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两平面平行、重合或相交", "formula": "$$\\text{平面}\\pi_1:A_1x+B_1y+C_1z+D_1=0\\text{与}\\pi_2:A_2x+B_2y+C_2z+D_2=0\\text{平行当且仅当}\\frac{A_1}{A_2}=\\frac{B_1}{B_2}=\\frac{C_1}{C_2}\\ne\\frac{D_1}{D_2}$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间点、直线、平面的位置关系"}, {"id": "MACRO_04_003_01_A004", "name": "直线与直线的位置关系", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两直线平行、相交、重合或异面", "formula": "$$\\text{直线}L_1:\\frac{x-x_1}{a_1}=\\frac{y-y_1}{b_1}=\\frac{z-z_1}{c_1}\\text{与}L_2:\\frac{x-x_2}{a_2}=\\frac{y-y_2}{b_2}=\\frac{z-z_2}{c_2}\\text{共面当且仅当}\\begin{vmatrix} x_2-x_1 & y_2-y_1 & z_2-z_1 \\\\ a_1 & b_1 & c_1 \\\\ a_2 & b_2 & c_2 \\end{vmatrix}=0$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间点、直线、平面的位置关系"}, {"id": "MACRO_04_002", "name": "表面积体积", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_002_空间几何体表面积公式推导", "name": "空间几何体表面积公式推导", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_002_01_A001", "name": "棱柱表面积公式推导", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "棱柱的表面积等于其所有侧面面积之和加上两个底面的面积。由于侧面由多个矩形组成，每个矩形的面积是底面多边形的边长乘以棱柱的高，因此总侧面积等于底面周长乘以高。", "formula": "$$S_{\\text{棱柱}} = S_{\\text{侧}} + 2S_{\\text{底}} = C_{\\text{底}} \\cdot h + 2S_{\\text{底}}$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体表面积公式推导"}, {"id": "MACRO_04_003_空间直线与平面的平行关系", "name": "空间直线与平面的平行关系", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_003_02_A001", "name": "直线与平面平行的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与一个平面没有公共点，则称这条直线与该平面平行。", "formula": "", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的平行关系"}, {"id": "MACRO_04_002_01_A002", "name": "棱锥表面积公式推导", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "棱锥的表面积等于其所有侧面三角形的面积之和加上底面的面积。侧面三角形的面积需要根据棱锥的斜高（侧面三角形的高）和底面边长计算。", "formula": "$$S_{\\text{棱锥}} = S_{\\text{侧}} + S_{\\text{底}} = \\frac{1}{2} \\cdot C_{\\text{底}} \\cdot l + S_{\\text{底}}$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体表面积公式推导"}, {"id": "MACRO_04_003_02_A002", "name": "直线与平面平行的判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果平面外一条直线与此平面内的一条直线平行，则该直线与此平面平行。", "formula": "$$\\text{若} \\ l \\not\\subset \\alpha, \\ m \\subset \\alpha, \\ l \\parallel m, \\ \\text{则} \\ l \\parallel \\alpha$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的平行关系"}, {"id": "MACRO_04_002_01_A003", "name": "圆柱表面积公式推导", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "圆柱的表面积由侧面积和两个底面积组成。侧面展开是一个矩形，其长为底面圆的周长，宽为圆柱的高；底面为圆形。", "formula": "$$S_{\\text{圆柱}} = S_{\\text{侧}} + 2S_{\\text{底}} = 2\\pi r \\cdot h + 2\\pi r^2$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体表面积公式推导"}, {"id": "MACRO_04_003_02_A003", "name": "直线与平面平行的性质定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与一个平面平行，则过这条直线的任意平面与此平面的交线与该直线平行。", "formula": "$$\\text{若} \\ l \\parallel \\alpha, \\ \\beta \\supset l, \\ \\beta \\cap \\alpha = m, \\ \\text{则} \\ l \\parallel m$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的平行关系"}, {"id": "MACRO_04_002_01_A004", "name": "圆锥表面积公式推导", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "圆锥的表面积由侧面积和底面积组成。侧面展开是一个扇形，其弧长等于底面圆的周长，半径等于圆锥的母线长；底面为圆形。", "formula": "$$S_{\\text{圆锥}} = S_{\\text{侧}} + S_{\\text{底}} = \\pi r \\cdot l + \\pi r^2$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体表面积公式推导"}, {"id": "MACRO_04_003_02_A004", "name": "直线与平面平行的传递性", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果两条直线都与同一个平面平行，则这两条直线互相平行。", "formula": "$$\\text{若} \\ l \\parallel \\alpha, \\ m \\parallel \\alpha, \\ \\text{则} \\ l \\parallel m$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的平行关系"}, {"id": "MACRO_04_002_组合体体积计算方法", "name": "组合体体积计算方法", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_002_02_A001", "name": "基本几何体体积公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "掌握常见几何体体积计算公式", "formula": "$立方体V=a^3$；$长方体V=abc$；$圆柱V=\\pi r^2 h$；$圆锥V=\\frac{1}{3}\\pi r^2 h$；$球体V=\\frac{4}{3}\\pi R^3$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "组合体体积计算方法"}, {"id": "MACRO_04_002_02_A002", "name": "分割法求体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "将组合体分解为基本几何体后体积相加", "formula": "$V=V_1+V_2+\\cdots+V_n$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "组合体体积计算方法"}, {"id": "MACRO_04_002_02_A003", "name": "补集法求体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "通过补形后减去多余部分体积", "formula": "$V=V_{\\text{大立体}}-V_{\\text{被挖部分}}$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "组合体体积计算方法"}, {"id": "MACRO_04_002_02_A004", "name": "对称性体积计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用几何体对称特征简化体积计算", "formula": "$V=V_{\\text{对称单元}} \\times n$（n为对称次数）", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "组合体体积计算方法"}, {"id": "MACRO_04_003_空间直线与平面的垂直关系", "name": "空间直线与平面的垂直关系", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_003_03_A001", "name": "直线与平面垂直的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线垂直于平面内的任意一条直线，那么这条直线垂直于该平面。这是判断直线与平面垂直的基本依据。", "formula": "$$l \\perp \\alpha \\Leftrightarrow \\forall m \\subset \\alpha, l \\perp m$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的垂直关系"}, {"id": "MACRO_04_003_03_A002", "name": "直线与平面垂直的判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与平面内的两条相交直线都垂直，那么这条直线垂直于该平面。这是证明线面垂直最常用的方法。", "formula": "$$l \\perp a, l \\perp b, a \\cap b = O, a,b \\subset \\alpha \\Rightarrow l \\perp \\alpha$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的垂直关系"}, {"id": "MACRO_04_003_03_A003", "name": "直线与平面垂直的性质定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果两条直线同时垂直于同一个平面，那么这两条直线互相平行。这是由线面垂直推导线线平行的重要结论。", "formula": "$$l \\perp \\alpha, m \\perp \\alpha \\Rightarrow l \\parallel m$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的垂直关系"}, {"id": "MACRO_04_003_03_A004", "name": "三垂线定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "平面内的一条直线，如果和穿过这个平面的一条斜线在这个平面内的射影垂直，那么它也和这条斜线垂直。常用于空间角与距离的计算。", "formula": "$$PA \\perp \\alpha, AO \\subset \\alpha, l \\subset \\alpha, l \\perp AO \\Rightarrow l \\perp PO$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间直线与平面的垂直关系"}, {"id": "MACRO_04_003_空间平面与平面的位置关系", "name": "空间平面与平面的位置关系", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_003_04_A001", "name": "平面的一般方程", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "空间中任一平面均可表示为Ax+By+Cz+D=0，其中A,B,C不全为零，法向量为(A,B,C)", "formula": "$$Ax+By+Cz+D=0$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间平面与平面的位置关系"}, {"id": "MACRO_04_003_04_A002", "name": "两平面平行的条件", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两平面法向量平行（存在非零实数k使得A₁=kA₂, B₁=kB₂, C₁=kC₂），则两平面平行", "formula": "$$\\vec{n_1} \\parallel \\vec{n_2}$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间平面与平面的位置关系"}, {"id": "MACRO_04_003_04_A003", "name": "两平面垂直的条件", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两平面法向量垂直（点积为零），则两平面垂直", "formula": "$$\\vec{n_1} \\cdot \\vec{n_2} = 0$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间平面与平面的位置关系"}, {"id": "MACRO_04_003_04_A004", "name": "两平面夹角公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两平面法向量夹角θ满足cosθ=|A₁A₂+B₁B₂+C₁C₂| / (√(A₁²+B₁²+C₁²)√(A₂²+B₂²+C₂²))，θ为锐角或直角", "formula": "$$\\cos\\theta = \\frac{|\\vec{n_1} \\cdot \\vec{n_2}|}{|\\vec{n_1}||\\vec{n_2}|}$$", "domain_zh": "立体几何", "macro_topic": "位置关系", "micro_topic": "空间平面与平面的位置关系"}, {"id": "MACRO_04_004", "name": "平行关系", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_004_平行关系基础概念", "name": "平行关系基础概念", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_004_01_A001", "name": "平行线的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在同一平面内，永不相交的两条直线称为平行线。", "formula": "$$l_1 \\parallel l_2$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平行关系基础概念"}, {"id": "MACRO_04_004_01_A002", "name": "平行线的判定", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "同位角相等、内错角相等或同旁内角互补的两条直线平行。", "formula": "$$\\angle 1 = \\angle 2 \\Rightarrow l_1 \\parallel l_2$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平行关系基础概念"}, {"id": "MACRO_04_004_01_A003", "name": "平行线的性质", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "平行线被第三条直线所截，同位角相等，内错角相等，同旁内角互补。", "formula": "$$l_1 \\parallel l_2 \\Rightarrow \\angle 3 = \\angle 4$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平行关系基础概念"}, {"id": "MACRO_04_004_01_A004", "name": "平行线间的距离", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "平行线间任意一点到另一条直线的距离都相等，这个距离称为平行线间的距离。", "formula": "$$d = \\frac{|Ax_0 + By_0 + C|}{\\sqrt{A^2 + B^2}}$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平行关系基础概念"}, {"id": "MACRO_04_002_空间几何体实际应用问题", "name": "空间几何体实际应用问题", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_002_04_A001", "name": "长方体表面积计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算长方体六个面的总面积", "formula": "$$S=2(ab+ah+bh)$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体实际应用问题"}, {"id": "MACRO_04_002_04_A002", "name": "棱柱体积计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "底面积与高的乘积", "formula": "$$V=Bh$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体实际应用问题"}, {"id": "MACRO_04_002_04_A003", "name": "圆柱表面积计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个底面与侧面积之和", "formula": "$$S=2\\pi r^2+2\\pi rh$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体实际应用问题"}, {"id": "MACRO_04_002_04_A004", "name": "组合体体积计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "由圆柱和半球组成的复合几何体体积", "formula": "$$V=\\pi r^2h+\\frac{2}{3}\\pi r^3$$", "domain_zh": "立体几何", "macro_topic": "表面积体积", "micro_topic": "空间几何体实际应用问题"}, {"id": "MACRO_04_004_直线与直线平行", "name": "直线与直线平行", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_004_02_A001", "name": "直线与直线平行的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在同一平面内，两条直线没有公共点，则称这两条直线互相平行。平行用符号“∥”表示，如直线a平行于直线b，记作a∥b。", "formula": "$$a \\parallel b$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与直线平行"}, {"id": "MACRO_04_004_02_A002", "name": "平行公理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "过直线外一点，有且只有一条直线与这条直线平行。这是欧几里得几何的基本公理之一，也称为平行公理。", "formula": "$$\\text{过点}P(\\text{在直线}l\\text{外}) \\text{有且仅有一条直线}m \\text{使得} m \\parallel l$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与直线平行"}, {"id": "MACRO_04_004_02_A003", "name": "同位角相等判定两直线平行", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两条直线被第三条直线所截，如果同位角相等，那么这两条直线平行。这是判定两条直线平行的常用方法之一。", "formula": "$$\\text{若} \\angle 1 = \\angle 2 \\text{（同位角）}，\\text{则} l_1 \\parallel l_2$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与直线平行"}, {"id": "MACRO_04_004_02_A004", "name": "平行线的传递性", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果两条直线分别与第三条直线平行，那么这两条直线也互相平行。即，若a∥b且b∥c，则a∥c。", "formula": "$$\\text{若} a \\parallel b \\text{且} b \\parallel c，\\text{则} a \\parallel c$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与直线平行"}, {"id": "MACRO_04_004_直线与平面平行", "name": "直线与平面平行", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_004_03_A001", "name": "直线与平面平行的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "直线与平面没有公共点，称为直线与平面平行。", "formula": "$a \\parallel \\alpha$ 当且仅当 $a \\cap \\alpha = \\emptyset$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与平面平行"}, {"id": "MACRO_04_004_03_A002", "name": "直线与平面平行的判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "若平面外直线a与平面内直线b平行，则直线a与平面α平行。", "formula": "$a \\not\\subset \\alpha, b \\subset \\alpha, a \\parallel b \\Rightarrow a \\parallel \\alpha$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与平面平行"}, {"id": "MACRO_04_004_03_A003", "name": "直线与平面平行的性质定理一", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "若直线a与平面α平行，则平面α内存在无数条直线与a平行。", "formula": "$a \\parallel \\alpha \\Rightarrow \\exists \\infty \\text{条} b \\subset \\alpha, b \\parallel a$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与平面平行"}, {"id": "MACRO_04_004_03_A004", "name": "直线与平面平行的交线性质", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "若直线a与平面α平行，且平面β过a并与α交于直线b，则a与b平行。", "formula": "$a \\parallel \\alpha, a \\subset \\beta, \\beta \\cap \\alpha = b \\Rightarrow a \\parallel b$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "直线与平面平行"}, {"id": "MACRO_04_004_平面与平面平行", "name": "平面与平面平行", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_004_04_A001", "name": "平面平行的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个平面没有公共点，则称这两个平面互相平行", "formula": "$\\alpha \\parallel \\beta$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平面与平面平行"}, {"id": "MACRO_04_004_04_A002", "name": "平面平行的判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "若一个平面内有两条相交直线分别平行于另一个平面，则这两个平面平行", "formula": "$a\\subset\\alpha, b\\subset\\alpha, a\\cap b=P, a\\parallel\\beta, b\\parallel\\beta \\Rightarrow \\alpha\\parallel\\beta$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平面与平面平行"}, {"id": "MACRO_04_004_04_A003", "name": "平面平行的性质定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个平行平面的法向量互相平行", "formula": "$\\vec{n_1} \\parallel \\vec{n_2}$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平面与平面平行"}, {"id": "MACRO_04_004_04_A004", "name": "平行平面间距离公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两平行平面Ax+By+Cz+D₁=0与Ax+By+Cz+D₂=0之间的距离为", "formula": "$$d=\\frac{|D_1-D_2|}{\\sqrt{A^2+B^2+C^2}}$$", "domain_zh": "立体几何", "macro_topic": "平行关系", "micro_topic": "平面与平面平行"}, {"id": "MACRO_04_006", "name": "空间向量", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_006_空间向量的基本概念与运算", "name": "空间向量的基本概念与运算", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_006_01_A001", "name": "空间向量的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在空间中，既有大小又有方向的量称为空间向量，常用有向线段表示，记作$\\vec{a}$或$\\overrightarrow{AB}$。", "formula": "$$\\vec{a} = \\overrightarrow{AB}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的基本概念与运算"}, {"id": "MACRO_04_006_01_A002", "name": "空间向量的模", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "向量的大小称为向量的模，记作$|\\vec{a}|$或$|\\overrightarrow{AB}|$。若点$A(x_1,y_1,z_1)$，$B(x_2,y_2,z_2)$，则$|\\overrightarrow{AB}| = \\sqrt{(x_2-x_1)^2+(y_2-y_1)^2+(z_2-z_1)^2}$。", "formula": "$$|\\overrightarrow{AB}| = \\sqrt{(x_2-x_1)^2+(y_2-y_1)^2+(z_2-z_1)^2}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的基本概念与运算"}, {"id": "MACRO_04_006_01_A003", "name": "空间向量的线性运算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "加法：平行四边形法则或三角形法则；数乘：$\\lambda\\vec{a}$，当$\\lambda>0$时同向，$\\lambda<0$时反向；减法：$\\vec{a}-\\vec{b}=\\vec{a}+(-\\vec{b})$。", "formula": "$$\\vec{a} \\pm \\vec{b} = (x_1 \\pm x_2, y_1 \\pm y_2, z_1 \\pm z_2)$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的基本概念与运算"}, {"id": "MACRO_04_006_01_A004", "name": "共线向量与共面向量", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "共线向量：方向相同或相反的向量，$\\vec{a}\\parallel\\vec{b} \\Leftrightarrow \\vec{a}=\\lambda\\vec{b}$；共面向量：平行于同一平面的向量，$\\vec{a},\\vec{b},\\vec{c}$共面$\\Leftrightarrow$存在实数$x,y$使$\\vec{c}=x\\vec{a}+y\\vec{b}$。", "formula": "$$\\vec{a}\\parallel\\vec{b} \\Leftrightarrow \\vec{a}=\\lambda\\vec{b},\\quad \\vec{c}=x\\vec{a}+y\\vec{b} \\Rightarrow \\text{共面}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的基本概念与运算"}, {"id": "MACRO_04_005", "name": "垂直关系", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_005_直线与平面垂直", "name": "直线与平面垂直", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_005_01_A001", "name": "直线与平面垂直的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与平面内的任意一条直线都垂直，则该直线与该平面垂直", "formula": "$$l \\perp \\alpha \\Leftrightarrow \\forall m \\subset \\alpha, l \\perp m$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "直线与平面垂直"}, {"id": "MACRO_04_005_01_A002", "name": "直线与平面垂直的判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与平面内的两条相交直线都垂直，则该直线与该平面垂直", "formula": "$$l \\perp m, l \\perp n, m \\cap n = O, m,n \\subset \\alpha \\Rightarrow l \\perp \\alpha$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "直线与平面垂直"}, {"id": "MACRO_04_005_01_A003", "name": "直线与平面垂直的性质定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与一个平面垂直，则该直线垂直于平面内的所有直线", "formula": "$$l \\perp \\alpha, m \\subset \\alpha \\Rightarrow l \\perp m$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "直线与平面垂直"}, {"id": "MACRO_04_005_01_A004", "name": "点到平面的距离公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "点P到平面α的距离等于过点P且与平面α垂直的直线的垂足到P的距离", "formula": "$$d = \\frac{|Ax_0 + By_0 + Cz_0 + D|}{\\sqrt{A^2+B^2+C^2}}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "直线与平面垂直"}, {"id": "MACRO_04_006_空间向量的坐标表示", "name": "空间向量的坐标表示", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_006_02_A001", "name": "空间向量的坐标表示", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在空间直角坐标系中，任意向量可表示为$$\\vec{a} = a_x \\mathbf{i} + a_y \\mathbf{j} + a_z \\mathbf{k}$$，其中$$a_x, a_y, a_z$$为向量在三个坐标轴上的投影", "formula": "$$\\vec{a} = a_x \\mathbf{i} + a_y \\mathbf{j} + a_z \\mathbf{k}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的坐标表示"}, {"id": "MACRO_04_006_02_A002", "name": "向量坐标运算规则", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "空间向量加减法及数乘运算满足坐标对应运算规则：$$\\vec{a} \\pm \\vec{b} = (a_x \\pm b_x, a_y \\pm b_y, a_z \\pm b_z)$$，$$\\lambda \\vec{a} = (\\lambda a_x, \\lambda a_y, \\lambda a_z)$$", "formula": "$$\\vec{a} \\pm \\vec{b} = (a_x \\pm b_x, a_y \\pm b_y, a_z \\pm b_z)$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的坐标表示"}, {"id": "MACRO_04_006_02_A003", "name": "向量的模长计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "空间向量$$\\vec{a} = (a_x, a_y, a_z)$$的模长公式为$$|\\vec{a}| = \\sqrt{a_x^2 + a_y^2 + a_z^2}$$", "formula": "$$|\\vec{a}| = \\sqrt{a_x^2 + a_y^2 + a_z^2}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的坐标表示"}, {"id": "MACRO_04_006_02_A004", "name": "方向余弦表示", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "空间向量与坐标轴的夹角余弦值满足：$$\\cos \\alpha = \\frac{a_x}{|\\vec{a}|}, \\cos \\beta = \\frac{a_y}{|\\vec{a}|}, \\cos \\gamma = \\frac{a_z}{|\\vec{a}|}$$，其中$$\\alpha, \\beta, \\gamma$$为向量与x,y,z轴的夹角", "formula": "$$\\cos \\alpha = \\frac{a_x}{\\sqrt{a_x^2 + a_y^2 + a_z^2}}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的坐标表示"}, {"id": "MACRO_04_006_空间向量的数量积", "name": "空间向量的数量积", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_006_03_A001", "name": "空间向量的数量积定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个空间向量的数量积（点积）是一个标量，等于它们的模长乘积与它们夹角余弦的乘积。", "formula": "$$\\vec{a} \\cdot \\vec{b} = |\\vec{a}| |\\vec{b}| \\cos\\theta$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的数量积"}, {"id": "MACRO_04_006_03_A002", "name": "坐标表示的数量积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "若向量在直角坐标系中的坐标为 $\\vec{a}=(x_1,y_1,z_1)$，$\\vec{b}=(x_2,y_2,z_2)$，则数量积为对应坐标乘积之和。", "formula": "$$\\vec{a} \\cdot \\vec{b} = x_1x_2 + y_1y_2 + z_1z_2$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的数量积"}, {"id": "MACRO_04_006_03_A003", "name": "数量积的性质", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "数量积满足交换律、分配律，且与数乘结合；向量与自身的数量积等于其模长的平方。", "formula": "$$\\vec{a} \\cdot \\vec{a} = |\\vec{a}|^2$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的数量积"}, {"id": "MACRO_04_006_03_A004", "name": "垂直向量的数量积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个非零空间向量垂直的充要条件是它们的数量积为零。", "formula": "$$\\vec{a} \\perp \\vec{b} \\Leftrightarrow \\vec{a} \\cdot \\vec{b} = 0$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的数量积"}, {"id": "MACRO_04_005_平面与平面垂直", "name": "平面与平面垂直", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_005_02_A001", "name": "平面与平面垂直的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个平面垂直是指它们的法向量互相垂直，即法向量的点积为零", "formula": "$$\\vec{n_1} \\cdot \\vec{n_2} = 0$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "平面与平面垂直"}, {"id": "MACRO_04_005_02_A002", "name": "平面与平面垂直的判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一个平面经过另一个平面的垂线，则这两个平面垂直", "formula": "$$l \\perp \\alpha, l \\subset \\beta \\Rightarrow \\alpha \\perp \\beta$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "平面与平面垂直"}, {"id": "MACRO_04_005_02_A003", "name": "平面与平面垂直的性质定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果两个平面垂直，那么在一个平面内垂直于交线的直线垂直于另一个平面", "formula": "$$\\alpha \\perp \\beta, l = \\alpha \\cap \\beta, m \\subset \\alpha, m \\perp l \\Rightarrow m \\perp \\beta$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "平面与平面垂直"}, {"id": "MACRO_04_005_02_A004", "name": "平面法向量与垂直关系", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个平面垂直的充要条件是它们的法向量互相垂直", "formula": "$$\\alpha \\perp \\beta \\Leftrightarrow \\vec{n_\\alpha} \\cdot \\vec{n_\\beta} = 0$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "平面与平面垂直"}, {"id": "MACRO_04_006_空间向量的向量积与混合积", "name": "空间向量的向量积与混合积", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_006_04_A001", "name": "向量积的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "向量积的模长等于两向量模长与夹角正弦的乘积，方向垂直于两向量所在平面，符合右手定则", "formula": "$$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的向量积与混合积"}, {"id": "MACRO_04_006_04_A002", "name": "向量积的坐标运算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "通过行列式展开计算三维向量的向量积", "formula": "$$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\end{vmatrix}$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的向量积与混合积"}, {"id": "MACRO_04_006_04_A003", "name": "混合积的定义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "三个向量的混合积等于其中一个向量与另外两个向量叉积的点积", "formula": "$$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的向量积与混合积"}, {"id": "MACRO_04_006_04_A004", "name": "混合积的几何意义", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "混合积的绝对值表示以三个向量为邻边的平行六面体的体积", "formula": "$$V = |\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$", "domain_zh": "立体几何", "macro_topic": "空间向量", "micro_topic": "空间向量的向量积与混合积"}, {"id": "MACRO_04_005_三垂线定理及其应用", "name": "三垂线定理及其应用", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_005_03_A001", "name": "三垂线定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在平面内的一条直线，如果和这个平面的一条斜线的射影垂直，那么它也和这条斜线垂直。", "formula": "$$l \\perp \\text{射影} \\Rightarrow l \\perp \\text{斜线}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "三垂线定理及其应用"}, {"id": "MACRO_04_005_03_A002", "name": "三垂线定理的逆定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在平面内的一条直线，如果和这个平面的一条斜线垂直，那么它也和这条斜线的射影垂直。", "formula": "$$l \\perp \\text{斜线} \\Rightarrow l \\perp \\text{射影}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "三垂线定理及其应用"}, {"id": "MACRO_04_005_03_A003", "name": "点到平面的距离", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用三垂线定理可以求解点到平面的距离，即点到平面垂线的长度。", "formula": "$$d = \\frac{|Ax_0 + By_0 + Cz_0 + D|}{\\sqrt{A^2 + B^2 + C^2}}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "三垂线定理及其应用"}, {"id": "MACRO_04_005_03_A004", "name": "直线与平面垂直的判定", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "若一条直线垂直于平面内的两条相交直线，则该直线垂直于该平面。", "formula": "$$l \\perp a, l \\perp b, a \\cap b \\neq \\emptyset \\Rightarrow l \\perp \\text{平面}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "三垂线定理及其应用"}, {"id": "MACRO_04_007", "name": "向量应用", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_007_向量在空间几何体中的应用", "name": "向量在空间几何体中的应用", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_007_01_A001", "name": "空间向量的坐标表示", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "在空间直角坐标系中，向量可以用坐标表示。若点A坐标为$(x_1, y_1, z_1)$，点B坐标为$(x_2, y_2, z_2)$，则向量$\\overrightarrow{AB}$的坐标为终点坐标减去起点坐标。", "formula": "$$\\overrightarrow{AB} = (x_2 - x_1, y_2 - y_1, z_2 - z_1)$$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量在空间几何体中的应用"}, {"id": "MACRO_04_007_01_A002", "name": "空间向量的数量积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个空间向量的数量积（点积）等于它们的模长乘以夹角的余弦值，也可通过坐标计算。数量积可用于判断向量垂直或求夹角。", "formula": "$$\\vec{a} \\cdot \\vec{b} = |\\vec{a}| |\\vec{b}| \\cos\\langle\\vec{a}, \\vec{b}\\rangle = a_x b_x + a_y b_y + a_z b_z$$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量在空间几何体中的应用"}, {"id": "MACRO_04_007_01_A003", "name": "空间向量的向量积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两个空间向量的向量积（叉积）结果是一个新向量，其方向垂直于原两向量所在平面，模长等于两向量模长乘以夹角的正弦值。向量积可用于求法向量或平行四边形面积。", "formula": "$$\\vec{a} \\times \\vec{b} = (a_y b_z - a_z b_y, a_z b_x - a_x b_z, a_x b_y - a_y b_x)$$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量在空间几何体中的应用"}, {"id": "MACRO_04_007_01_A004", "name": "利用向量求空间点到直线的距离", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "已知空间一点P和直线l（过点A，方向向量为$\\vec{s}$），点P到直线l的距离可通过向量叉积的模长除以方向向量的模长来计算。", "formula": "$$d = \\frac{|\\overrightarrow{AP} \\times \\vec{s}|}{|\\vec{s}|}$$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量在空间几何体中的应用"}, {"id": "MACRO_04_005_垂直关系的综合应用", "name": "垂直关系的综合应用", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_005_04_A001", "name": "直线与直线垂直的向量判定", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两直线方向向量的点积为零", "formula": "$$\\vec{v_1} \\cdot \\vec{v_2} = 0$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "垂直关系的综合应用"}, {"id": "MACRO_04_005_04_A002", "name": "直线与平面垂直的向量条件", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "直线方向向量与平面法向量平行", "formula": "$$\\vec{v} \\parallel \\vec{n}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "垂直关系的综合应用"}, {"id": "MACRO_04_005_04_A003", "name": "平面与平面垂直的法向量关系", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "两平面法向量的点积为零", "formula": "$$\\vec{n_1} \\cdot \\vec{n_2} = 0$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "垂直关系的综合应用"}, {"id": "MACRO_04_005_04_A004", "name": "点到平面的距离公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用平面方程和点坐标计算距离", "formula": "$$d = \\frac{|Ax_0 + By_0 + Cz_0 + D|}{\\sqrt{A^2 + B^2 + C^2}}$$", "domain_zh": "立体几何", "macro_topic": "垂直关系", "micro_topic": "垂直关系的综合应用"}, {"id": "MACRO_04_008", "name": "几何压轴", "level": "macro", "val": 16, "color": "#2ecc71"}, {"id": "MACRO_04_008_空间几何体的表面积与体积", "name": "空间几何体的表面积与体积", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_008_01_A001", "name": "棱柱的表面积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "棱柱的表面积等于其所有面的面积之和，即两个底面积与侧面积之和。", "formula": "$$S_{\\text{棱柱}} = 2S_{\\text{底}} + S_{\\text{侧}}$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间几何体的表面积与体积"}, {"id": "MACRO_04_008_01_A002", "name": "棱锥的体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "棱锥的体积等于底面积与高的乘积的三分之一。", "formula": "$$V_{\\text{棱锥}} = \\frac{1}{3} S_{\\text{底}} \\cdot h$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间几何体的表面积与体积"}, {"id": "MACRO_04_008_01_A003", "name": "球的表面积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "球的表面积等于其半径平方的4π倍。", "formula": "$$S_{\\text{球}} = 4\\pi R^2$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间几何体的表面积与体积"}, {"id": "MACRO_04_008_01_A004", "name": "圆柱的体积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "圆柱的体积等于底面积与高的乘积。", "formula": "$$V_{\\text{圆柱}} = S_{\\text{底}} \\cdot h = \\pi R^2 h$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间几何体的表面积与体积"}, {"id": "MACRO_04_007_向量法求解空间角与距离", "name": "向量法求解空间角与距离", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_007_02_A001", "name": "向量夹角公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用向量点积计算两向量之间的夹角", "formula": "$$\\cos\\theta = \\frac{\\vec{a} \\cdot \\vec{b}}{|\\vec{a}| \\cdot |\\vec{b}|}$$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量法求解空间角与距离"}, {"id": "MACRO_04_007_02_A002", "name": "点到平面距离公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用向量法计算空间中点到平面的距离", "formula": "$$d = \\frac{|\\vec{n} \\cdot \\vec{P_0P}|}{|\\vec{n}|}$$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量法求解空间角与距离"}, {"id": "MACRO_04_007_02_A003", "name": "异面直线距离公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算空间中两条异面直线间的最短距离", "formula": "$$d = \\frac{|(\\vec{P_1P_2}) \\cdot (\\vec{v_1} \\times \\vec{v_2})|}{|\\vec{v_1} \\times \\vec{v_2}|}$$", "domai O_04_007_04_A002", "name": "向量叉积求面积", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用向量叉积的模长计算空间三角形或平行四边形面积", "formula": "$|\\vec{a} \\times \\vec{b}| = |\\vec{a}||\\vec{b}|\\sin\\theta$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量法解决空间几何中的最值问题"}, {"id": "MACRO_04_007_04_A003", "name": "空间点到直线距离公式", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "通过向量叉积计算空间一点到直线的最短距离", "formula": "$d = \\frac{|(\\vec{P_2} - \\vec{P_1}) \\times \\vec{v}|}{|\\vec{v}|}$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量法解决空间几何中的最值问题"}, {"id": "MACRO_04_007_04_A004", "name": "拉格朗日乘数法建模", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "构建目标函数与约束条件的向量形式，求解空间几何极值问题", "formula": "$\\nabla f(\\vec{x}) = \\lambda \\nabla g(\\vec{x})$", "domain_zh": "立体几何", "macro_topic": "向量应用", "micro_topic": "向量法解决空间几何中的最值问题"}, {"id": "D_AnalyticGeo", "name": "解析几何", "level": "domain", "val": 26, "color": "#1abc9c"}, {"id": "MACRO_05_001", "name": "直线方程", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_001_直线的倾斜角与斜率", "name": "直线的倾斜角与斜率", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_001_01_A001", "name": "倾斜角的定义", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "直线与x轴正方向所成的最小正角，范围为[0°, 180°)", "formula": "$$\\alpha \\in [0^\\circ, 180^\\circ)$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线的倾斜角与斜率"}, {"id": "MACRO_05_001_01_A002", "name": "斜率的定义", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "直线倾斜角的正切值，表示直线的倾斜程度", "formula": "$$k = \\tan\\alpha$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线的倾斜角与斜率"}, {"id": "MACRO_05_001_01_A003", "name": "斜率与倾斜角的关系", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "当倾斜角为90°时，斜率不存在；其他角度下斜率唯一确定", "formula": "$$k = \\begin{cases} \\tan\\alpha & \\alpha \\ne 90^\\circ \\\\ \\text{不存在} & \\alpha = 90^\\circ \\end{cases}$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线的倾斜角与斜率"}, {"id": "MACRO_05_001_01_A004", "name": "两点确定斜率", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知直线上两点坐标(x₁,y₁)和(x₂,y₂)，可计算斜率", "formula": "$$k = \\frac{y_2 - y_1}{x_2 - x_1} \\quad (x_1 \\ne x_2)$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线的倾斜角与斜率"}, {"id": "MACRO_05_001_直线方程的五种形式", "name": "直线方程的五种形式", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_001_02_A001", "name": "点斜式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知直线的斜率k和一点(x₁,y₁)", "formula": "$$y - y_1 = k(x - x_1)$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线方程的五种形式"}, {"id": "MACRO_05_002", "name": "圆的方程", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_002_圆的标准方程", "name": "圆的标准方程", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_002_01_A001", "name": "圆的标准方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "圆心为$(a,b)$，半径为$r$的圆的标准方程为$(x-a)^2+(y-b)^2=r^2$。", "formula": "$$(x-a)^2+(y-b)^2=r^2$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的标准方程"}, {"id": "MACRO_05_001_02_A002", "name": "斜截式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知直线的斜率k和y轴截距b", "formula": "$$y = kx + b$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线方程的五种形式"}, {"id": "MACRO_05_002_01_A002", "name": "圆心坐标", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "在标准方程$(x-a)^2+(y-b)^2=r^2$中，圆心坐标为$(a,b)$。", "formula": "$$O(a,b)$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的标准方程"}, {"id": "MACRO_05_001_02_A003", "name": "两点式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知直线上两点(x₁,y₁)和(x₂,y₂)", "formula": "$$\\frac{y - y_1}{y_2 - y_1} = \\frac{x - x_1}{x_2 - x_1}$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线方程的五种形式"}, {"id": "MACRO_05_002_01_A003", "name": "半径公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "在标准方程$(x-a)^2+(y-b)^2=r^2$中，半径$r$为正值，且$r>0$。", "formula": "$$r>0$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的标准方程"}, {"id": "MACRO_05_001_02_A004", "name": "一般式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "直线的一般标准形式，A、B不全为零", "formula": "$$Ax + By + C = 0$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "直线方程的五种形式"}, {"id": "MACRO_05_002_01_A004", "name": "特殊位置的圆", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "当圆心在原点时，圆的标准方程简化为$x^2+y^2=r^2$。", "formula": "$$x^2+y^2=r^2$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的标准方程"}, {"id": "MACRO_05_001_两条直线的位置关系", "name": "两条直线的位置关系", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_001_03_A001", "name": "平行的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "两条直线斜率相等且截距不等", "formula": "$$k_1 = k_2 \\text{ 且 } b_1 \\neq b_2$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "两条直线的位置关系"}, {"id": "MACRO_05_001_03_A002", "name": "垂直的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "两条直线斜率乘积等于-1", "formula": "$$k_1 \\cdot k_2 = -1$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "两条直线的位置关系"}, {"id": "MACRO_05_001_03_A003", "name": "相交的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "两条直线斜率不相等", "formula": "$$k_1 \\neq k_2$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "两条直线的位置关系"}, {"id": "MACRO_05_001_03_A004", "name": "重合的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "两条直线斜率和截距分别相等", "formula": "$$k_1 = k_2 \\text{ 且 } b_1 = b_2$$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "两条直线的位置关系"}, {"id": "MACRO_05_001_距离公式及其应用", "name": "距离公式及其应用", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_001_04_A001", "name": "两点间距离公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "计算平面直角坐标系中任意两点之间的直线距离", "formula": "$d=\\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "距离公式及其应用"}, {"id": "MACRO_05_001_04_A002", "name": "点到直线距离公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "计算点到直线的一般式方程的垂直距离", "formula": "$d=\\frac{|Ax_0+By_0+C|}{\\sqrt{A^2+B^2}}$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "距离公式及其应用"}, {"id": "MACRO_05_001_04_A003", "name": "平行线间距离公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "计算两条平行直线Ax+By+C₁=0与Ax+By+C₂=0之间的距离", "formula": "$d=\\frac{|C_1-C_2|}{\\sqrt{A^2+B^2}}$", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "距离公式及其应用"}, {"id": "MACRO_05_001_04_A004", "name": "距离公式在最短路径中的应用", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "利用对称点原理解决镜面反射类最短路径问题", "formula": "$PA+PB=PA'+PB$（A'为A关于直线的对称点）", "domain_zh": "解析几何", "macro_topic": "直线方程", "micro_topic": "距离公式及其应用"}, {"id": "MACRO_04_008_空间位置关系证明", "name": "空间位置关系证明", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_008_03_A001", "name": "线面垂直判定定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果一条直线与平面内的两条相交直线都垂直，则该直线与此平面垂直", "formula": "$$\\text{若} l \\perp m, l \\perp n, m \\cap n = O, m,n \\subset \\alpha, \\text{则} l \\perp \\alpha$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间位置关系证明"}, {"id": "MACRO_04_008_03_A002", "name": "面面垂直性质定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "如果两个平面垂直，那么在一个平面内垂直于它们交线的直线垂直于另一个平面", "formula": "$$\\text{若} \\alpha \\perp \\beta, \\alpha \\cap \\beta = l, m \\subset \\alpha, m \\perp l, \\text{则} m \\perp \\beta$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间位置关系证明"}, {"id": "MACRO_04_008_03_A003", "name": "三垂线定理", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "平面内的一条直线如果与平面的斜线在平面内的射影垂直，那么它也与斜线垂直", "formula": "$$\\text{若} PA \\perp \\alpha, AO \\text{为斜线} PO \\text{在} \\alpha \\text{内的射影}, l \\subset \\alpha, l \\perp AO, \\text{则} l \\perp PO$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间位置关系证明"}, {"id": "MACRO_04_008_03_A004", "name": "空间向量法证明垂直", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "利用空间向量的数量积为零来证明直线与直线、直线与平面、平面与平面的垂直关系", "formula": "$$\\vec{a} \\perp \\vec{b} \\Leftrightarrow \\vec{a} \\cdot \\vec{b} = 0$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "空间位置关系证明"}, {"id": "MACRO_04_008_截面与投影问题", "name": "截面与投影问题", "level": "micro", "val": 9, "color": "#2ecc71"}, {"id": "MACRO_04_008_04_A001", "name": "截面形状判断", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "根据立体几何体的类型和截面方向，判断截面的形状，如圆柱的截面可能是矩形、圆或椭圆", "formula": "$$\\text{形状} = f(\\text{几何体}, \\text{截面方向})$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "截面与投影问题"}, {"id": "MACRO_04_008_04_A002", "name": "投影长度计算", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "计算几何体在平面上的投影长度，涉及光线方向与几何体关系的分析", "formula": "$$L_{\\text{投影}} = \\frac{L_{\\text{实际}} \\cdot \\cos\\theta}{\\sin\\phi}$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "截面与投影问题"}, {"id": "MACRO_04_008_04_A003", "name": "截面面积求解", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "基于截面与几何体的相交关系，利用几何公式计算截面面积", "formula": "$$A = \\int dA = \\frac{1}{2} \\cdot r^2 \\cdot \\theta$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "截面与投影问题"}, {"id": "MACRO_04_008_04_A004", "name": "投影重叠分析", "level": "atomic", "val": 4, "color": "#2ecc71", "desc": "分析多个几何体投影的重叠部分，判断可见性或计算重叠面积", "formula": "$$A_{\\text{重叠}} = A_1 \\cap A_2$$", "domain_zh": "立体几何", "macro_topic": "几何压轴", "micro_topic": "截面与投影问题"}, {"id": "MACRO_05_002_圆的一般方程", "name": "圆的一般方程", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_002_02_A001", "name": "圆的一般方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "圆的一般方程形式为 $x^2 + y^2 + Dx + Ey + F = 0$，其中 $D^2 + E^2 - 4F > 0$", "formula": "$$x^2 + y^2 + Dx + Ey + F = 0$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的一般方程"}, {"id": "MACRO_05_002_02_A002", "name": "圆心坐标", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "圆的一般方程 $(x^2 + y^2 + Dx + Ey + F = 0)$ 的圆心坐标为 $(-\\frac{D}{2}, -\\frac{E}{2})$", "formula": "$$(-\\frac{D}{2}, -\\frac{E}{2})$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的一般方程"}, {"id": "MACRO_05_002_02_A003", "name": "半径公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "圆的一般方程 $(x^2 + y^2 + Dx + Ey + F = 0)$ 的半径 $r = \\frac{1}{2}\\sqrt{D^2 + E^2 - 4F}$", "formula": "$$r = \\frac{1}{2}\\sqrt{D^2 + E^2 - 4F}$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的一般方程"}, {"id": "MACRO_05_002_02_A004", "name": "判别式条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "方程 $x^2 + y^2 + Dx + Ey + F = 0$ 表示圆的条件是 $D^2 + E^2 - 4F > 0$", "formula": "$$D^2 + E^2 - 4F > 0$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "圆的一般方程"}, {"id": "MACRO_05_004", "name": "椭圆", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_004_椭圆的定义与基本性质", "name": "椭圆的定义与基本性质", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_004_01_A001", "name": "椭圆的定义", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "平面上到两个定点（焦点）的距离之和等于常数（大于两焦点间距离）的点的轨迹", "formula": "$$|PF_1| + |PF_2| = 2a$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的定义与基本性质"}, {"id": "MACRO_05_004_01_A002", "name": "椭圆的标准方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "中心在原点，焦点在x轴上的椭圆标准方程为$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$，其中$a > b > 0$", "formula": "$$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的定义与基本性质"}, {"id": "MACRO_05_004_01_A003", "name": "椭圆的离心率", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "椭圆的离心率$e$定义为焦距与长轴长度的比值，满足$0 < e < 1$", "formula": "$$e = \\frac{c}{a} = \\sqrt{1 - \\frac{b^2}{a^2}}$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的定义与基本性质"}, {"id": "MACRO_05_004_01_A004", "name": "椭圆的焦点坐标", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "对于标准椭圆$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$，焦点坐标为$(\\pm c, 0)$，其中$c = \\sqrt{a^2 - b^2}$", "formula": "$$c = \\sqrt{a^2 - b^2}$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的定义与基本性质"}, {"id": "MACRO_05_003", "name": "直线与圆", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_003_直线的方程", "name": "直线的方程", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_003_01_A001", "name": "直线的斜截式与点斜式方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "掌握直线的斜截式方程y=kx+b和点斜式方程y-y₁=k(x-x₁)的推导及应用", "formula": "$y = kx + b$ 或 $y - y_1 = k(x - x_1)$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "直线的方程"}, {"id": "MACRO_05_003_01_A002", "name": "直线的平行与垂直条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "理解两直线平行时斜率相等(k₁=k₂)，垂直时斜率乘积为-1(k₁·k₂=-1)", "formula": "$k_1 = k_2$（平行）或 $k_1 \\cdot k_2 = -1$（垂直）", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "直线的方程"}, {"id": "MACRO_05_003_01_A003", "name": "点到直线的距离公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "掌握点(x₀,y₀)到直线Ax+By+C=0的距离计算方法", "formula": "$$d = \\frac{|Ax_0 + By_0 + C|}{\\sqrt{A^2 + B^2}}$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "直线的方程"}, {"id": "MACRO_05_003_01_A004", "name": "直线的一般式方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "理解Ax+By+C=0形式的几何意义及参数A,B,C对直线位置的影响", "formula": "$Ax + By + C = 0$（A,B不同时为零）", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "直线的方程"}, {"id": "MACRO_05_002_点与圆的位置关系", "name": "点与圆的位置关系", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_002_03_A001", "name": "点与圆的位置关系判断", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "设圆的方程为$(x-a)^2+(y-b)^2=r^2$，点$P(x_0,y_0)$到圆心$C(a,b)$的距离为$d=\\sqrt{(x_0-a)^2+(y_0-b)^2}$。比较$d$与$r$的大小：若$d>r$，则点在圆外；若$d=r$，则点在圆上；若$d<r$，则点在圆内。", "formula": "$$d=\\sqrt{(x_0-a)^2+(y_0-b)^2}$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "点与圆的位置关系"}, {"id": "MACRO_05_002_03_A002", "name": "点与圆的位置关系的代数判定", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "将点$P(x_0,y_0)$代入圆的方程$(x-a)^2+(y-b)^2=r^2$，计算$f(x_0,y_0)=(x_0-a)^2+(y_0-b)^2-r^2$。若$f(x_0,y_0)>0$，则点在圆外；若$f(x_0,y_0)=0$，则点在圆上；若$f(x_0,y_0)<0$，则点在圆内。", "formula": "$$f(x_0,y_0)=(x_0-a)^2+(y_0-b)^2-r^2$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "点与圆的位置关系"}, {"id": "MACRO_05_003_圆的标准方程与一般方程", "name": "圆的标准方程与一般方程", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_003_02_A001", "name": "圆的标准方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "圆心为$(h,k)$，半径为$r$的圆的标准方程", "formula": "$$(x-h)^2+(y-k)^2=r^2$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的标准方程与一般方程"}, {"id": "MACRO_05_002_03_A003", "name": "圆的一般方程下的位置关系", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "对于圆的一般方程$x^2+y^2+Dx+Ey+F=0$（满足$D^2+E^2-4F>0$），将点$P(x_0,y_0)$代入得$f(x_0,y_0)=x_0^2+y_0^2+Dx_0+Ey_0+F$。若$f(x_0,y_0)>0$，则点在圆外；若$f(x_0,y_0)=0$，则点在圆上；若$f(x_0,y_0)<0$，则点在圆内。", "formula": "$$f(x_0,y_0)=x_0^2+y_0^2+Dx_0+Ey_0+F$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "点与圆的位置关系"}, {"id": "MACRO_05_003_02_A002", "name": "圆的一般方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "圆的一般方程形式，其中$D,E,F$为常数且满足特定条件", "formula": "$$x^2+y^2+Dx+Ey+F=0$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的标准方程与一般方程"}, {"id": "MACRO_05_002_03_A004", "name": "点与圆的位置关系的应用", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "利用点与圆的位置关系可解决最值问题。例如，已知点$P$在圆$C$外，则$|PC|$的最小值为$d-r$，最大值为$d+r$；若点$P$在圆$C$内，则$|PC|$的最大值为$r-d$，最小值为$0$（当点与圆心重合时）。", "formula": "$$|PC|_{\\text{min}}=|d-r|,\\quad |PC|_{\\text{max}}=d+r$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "点与圆的位置关系"}, {"id": "MACRO_05_003_02_A003", "name": "一般方程转化为标准方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "通过配方法将圆的一般方程转化为标准方程", "formula": "$$(x+\\frac{D}{2})^2+(y+\\frac{E}{2})^2=\\frac{D^2+E^2-4F}{4}$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的标准方程与一般方程"}, {"id": "MACRO_05_003_02_A004", "name": "圆的方程条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "一般方程表示圆的条件是系数满足的关系", "formula": "$$D^2+E^2-4F > 0$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的标准方程与一般方程"}, {"id": "MACRO_05_002_直线与圆的位置关系", "name": "直线与圆的位置关系", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_002_04_A001", "name": "直线与圆的位置关系判定", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "通过圆心到直线的距离与半径比较判定位置关系", "formula": "$$d=\\frac{|Ax_0+By_0+C|}{\\sqrt{A^2+B^2}},\\quad \\begin{cases} d>r \\text{相离} \\\\ d=r \\text{相切} \\\\ d<r \\text{相交} \\end{cases}$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_002_04_A002", "name": "联立直线圆方程判别法", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "联立方程后通过判别式判断交点数量", "formula": "$$\\begin{cases} \\Delta>0 \\text{相交} \\\\ \\Delta=0 \\text{相切} \\\\ \\Delta<0 \\text{相离} \\end{cases}$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_002_04_A003", "name": "圆的切线方程公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知圆心坐标和切线距离求切线方程", "formula": "$$\\frac{|Ax_0+By_0+C|}{\\sqrt{A^2+B^2}}=r$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_002_04_A004", "name": "相交弦长计算公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "直线与圆相交时计算弦长的公式", "formula": "$$l=2\\sqrt{r^2-d^2}$$", "domain_zh": "解析几何", "macro_topic": "圆的方程", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_004_椭圆的标准方程", "name": "椭圆的标准方程", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_004_02_A001", "name": "椭圆的标准方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "当椭圆中心在原点，焦点在x轴上时，标准方程为 $\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$ (a > b > 0)；焦点在y轴上时，标准方程为 $\\frac{y^2}{a^2} + \\frac{x^2}{b^2} = 1$ (a > b > 0)。其中a为长半轴长，b为短半轴长。", "formula": "$$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 \\quad (a > b > 0)$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的标准方程"}, {"id": "MACRO_05_004_02_A002", "name": "椭圆的基本参数关系", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "椭圆中焦距、长半轴、短半轴满足关系 $c^2 = a^2 - b^2$，其中c为半焦距，即焦点到椭圆中心的距离。离心率 $e = \\frac{c}{a}$ (0 < e < 1)。", "formula": "$$c^2 = a^2 - b^2, \\quad e = \\frac{c}{a} \\quad (0 < e < 1)$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的标准方程"}, {"id": "MACRO_05_004_02_A003", "name": "椭圆的焦点坐标", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "对于标准方程 $\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$，焦点在x轴上，坐标为 $F_1(-c, 0)$ 和 $F_2(c, 0)$；对于 $\\frac{y^2}{a^2} + \\frac{x^2}{b^2} = 1$，焦点在y轴上，坐标为 $F_1(0, -c)$ 和 $F_2(0, c)$。", "formula": "$$F_1(-c, 0), \\, F_2(c, 0) \\quad \\text{或} \\quad F_1(0, -c), \\, F_2(0, c)$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的标准方程"}, {"id": "MACRO_05_004_02_A004", "name": "椭圆的几何性质", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "椭圆上任意一点P到两焦点 $F_1$、$F_2$ 的距离之和为常数 $2a$，即 $|PF_1| + |PF_2| = 2a$。这是椭圆的定义，也是推导标准方程的基础。", "formula": "$$|PF_1| + |PF_2| = 2a$$", "domain_zh": "解析几何", "macro_topic": "椭圆", "micro_topic": "椭圆的标准方程"}, {"id": "MACRO_05_003_圆的切线方程与弦长问题", "name": "圆的切线方程与弦长问题", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_003_04_A001", "name": "圆的切线方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知圆的标准方程和切点坐标，求切线方程", "formula": "$$(x_0 - a)(x - a) + (y_0 - b)(y - b) = r^2$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的切线方程与弦长问题"}, {"id": "MACRO_05_003_04_A002", "name": "切线斜率与圆心关系", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知圆心和切点，求切线斜率", "formula": "$$k = -\\frac{x_0 - a}{y_0 - b} \\quad (y_0 \\neq b)$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的切线方程与弦长问题"}, {"id": "MACRO_05_003_04_A003", "name": "弦长公式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知直线与圆相交，求弦长", "formula": "$$L = 2\\sqrt{r^2 - d^2}$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的切线方程与弦长问题"}, {"id": "MACRO_05_003_04_A004", "name": "圆心到直线距离", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "计算圆心到直线的距离，用于判断位置关系", "formula": "$$d = \\frac{|Ax_0 + By_0 + C|}{\\sqrt{A^2 + B^2}}$$", "domain_zh": "解析几何", "macro_topic": "直线与圆", "micro_topic": "圆的切线方程与弦长问题"}, {"id": "MACRO_05_005", "name": "双曲线", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_005_双曲线的几何性质", "name": "双曲线的几何性质", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_005_02_A001", "name": "双曲线的标准方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "双曲线有两种标准形式，开口方向分别沿x轴和y轴", "formula": "$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$（横轴开口）和$\\frac{y^2}{b^2} - \\frac{x^2}{a^2} = 1$（纵轴开口）", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的几何性质"}, {"id": "MACRO_05_005_02_A002", "name": "双曲线的几何参数关系", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "半实轴a、半虚轴b与焦距c满足勾股定理关系", "formula": "$c^2 = a^2 + b^2$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的几何性质"}, {"id": "MACRO_05_005_02_A003", "name": "双曲线的渐近线方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "双曲线渐近线斜率与实虚轴半长比值相关", "formula": "$y=\\pm \\frac{b}{a}x$（横轴开口）和$y=\\pm \\frac{a}{b}x$（纵轴开口）", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的几何性质"}, {"id": "MACRO_05_005_02_A004", "name": "双曲线的离心率", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "焦距与实轴长的比值定义离心率，反映开口程度", "formula": "$e = \\frac{c}{a} > 1$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的几何性质"}, {"id": "MACRO_05_005_双曲线的参数方程与极坐标方程", "name": "双曲线的参数方程与极坐标方程", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_005_03_A001", "name": "双曲线参数方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "双曲线的标准参数方程形式", "formula": "$x = a\\sec\\theta, y = b\\tan\\theta$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的参数方程与极坐标方程"}, {"id": "MACRO_05_005_03_A002", "name": "双曲线极坐标方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "极点在焦点处的双曲线极坐标方程", "formula": "$r = \\frac{a(e^2-1)}{1 + e\\cos\\theta}$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的参数方程与极坐标方程"}, {"id": "MACRO_05_005_03_A003", "name": "参数几何意义", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "参数θ与双曲线渐近线的几何关系", "formula": "$\\theta$表示点与实轴的夹角参数", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的参数方程与极坐标方程"}, {"id": "MACRO_05_005_03_A004", "name": "极坐标焦点位置", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "极坐标方程中焦点位置的参数影响", "formula": "$e > 1$时曲线开口方向由极轴决定", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线的参数方程与极坐标方程"}, {"id": "MACRO_05_005_双曲线与直线的位置关系", "name": "双曲线与直线的位置关系", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_005_04_A001", "name": "双曲线与直线位置关系的判别式", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "通过联立双曲线与直线方程，利用判别式判断位置关系（相交、相切、相离）。", "formula": "$$\\Delta = B^2 - 4AC$$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线与直线的位置关系"}, {"id": "MACRO_05_005_04_A002", "name": "双曲线与直线相切的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "当判别式等于零时，直线与双曲线相切，此时直线为双曲线的切线。", "formula": "$$\\Delta = 0$$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线与直线的位置关系"}, {"id": "MACRO_05_005_04_A003", "name": "双曲线与直线相交的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "当判别式大于零时，直线与双曲线有两个不同的交点，即相交。", "formula": "$$\\Delta > 0$$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线与直线的位置关系"}, {"id": "MACRO_05_005_04_A004", "name": "双曲线与直线相离的条件", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "当判别式小于零时，直线与双曲线没有交点，即相离。", "formula": "$$\\Delta < 0$$", "domain_zh": "解析几何", "macro_topic": "双曲线", "micro_topic": "双曲线与直线的位置关系"}, {"id": "MACRO_05_008", "name": "解几压轴", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_008_直线与圆的位置关系", "name": "直线与圆的位置关系", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_008_01_A001", "name": "位置关系判定", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "通过圆心到直线的距离与半径比较判断直线与圆的位置关系", "formula": "$$d=\\frac{|Ax_0+By_0+C|}{\\sqrt{A^2+B^2}}\\quad(r>0)$$", "domain_zh": "解析几何", "macro_topic": "解几压轴", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_008_01_A002", "name": "切线方程求解", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "已知圆心坐标和切点坐标时，切线方程的求解方法", "formula": "$$(x_1-a)(x-a)+(y_1-b)(y-b)=r^2$$", "domain_zh": "解析几何", "macro_topic": "解几压轴", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_008_01_A003", "name": "弦长计算", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "利用垂径定理计算直线与圆相交时的弦长", "formula": "$$|AB|=2\\sqrt{r^2-d^2}$$", "domain_zh": "解析几何", "macro_topic": "解几压轴", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_008_01_A004", "name": "中点轨迹方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "直线与圆相交时，弦中点满足的轨迹方程推导", "formula": "$$\\begin{cases}x=\\frac{x_1+x_2}{2}\\\\y=\\frac{y_1+y_2}{2}\\end{cases}$$", "domain_zh": "解析几何", "macro_topic": "解几压轴", "micro_topic": "直线与圆的位置关系"}, {"id": "MACRO_05_006", "name": "抛物线", "level": "macro", "val": 16, "color": "#1abc9c"}, {"id": "MACRO_05_006_抛物线的几何性质", "name": "抛物线的几何性质", "level": "micro", "val": 9, "color": "#1abc9c"}, {"id": "MACRO_05_006_02_A001", "name": "抛物线定义", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "平面内到定点F与到定直线l距离相等的点的轨迹", "formula": "$$y^2=4ax$$", "domain_zh": "解析几何", "macro_topic": "抛物线", "micro_topic": "抛物线的几何性质"}, {"id": "MACRO_05_006_02_A002", "name": "焦点坐标", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "抛物线标准方程中焦点F的位置坐标", "formula": "$$F(a,0)$$", "domain_zh": "解析几何", "macro_topic": "抛物线", "micro_topic": "抛物线的几何性质"}, {"id": "MACRO_05_006_02_A003", "name": "准线方程", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "抛物线标准方程中与焦点对应的定直线方程", "formula": "$$x=-a$$", "domain_zh": "解析几何", "macro_topic": "抛物线", "micro_topic": "抛物线的几何性质"}, {"id": "MACRO_05_006_02_A004", "name": "顶点坐标", "level": "atomic", "val": 4, "color": "#1abc9c", "desc": "抛物线标准方程中顶点O的位置坐标", "formula": "$$O(0,0)$$", "domain_zh": "解析几何", "macro_topic": "抛物线", "micro_topic": "抛物线的几何性质"}, {"id": "MACRO_05_007", "name": "圆锥曲线", "level": "macro", "val": 16
